<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫主子的占有欲是认真的 · 四格漫画</title>
<style>
  :root {
    --bg: #fdf6ee;
    --panel-bg: #fffef9;
    --ink: #3a3226;
    --cat-orange: #e8943a;
    --cat-light: #f5c98e;
    --cat-dark: #c4722a;
    --cat-nose: #e8877c;
    --accent: #e0553d;
    --soft-gray: #b8b0a4;
    --speech-bg: #ffffff;
    --skin: #f5dfc6;
    --hair: #3a3226;
    --cat-white: #faf8f5;
    --cat-white-dark: #e8e2d8;
    --cat-pink: #f0a0a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Noto Sans SC", "LXGW WenKai", "Microsoft YaHei", -apple-system, sans-serif;
    background: #f0e8db;
    background-image:
      radial-gradient(circle, rgba(180,160,140,0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .poster {
    width: 720px;
    max-width: 100%;
    background: var(--bg);
    border: 6px solid #3a3226;
    border-radius: 4px;
    padding: 32px 24px 24px;
    position: relative;
    box-shadow:
      8px 8px 0 rgba(58,50,38,0.12),
      16px 16px 0 rgba(58,50,38,0.05);
  }

  /* Title area */
  .title-area {
    text-align: center;
    margin-bottom: 22px;
    position: relative;
  }

  .title-label {
    display: inline-block;
    background: #3a3226;
    color: #fdf6ee;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.25em;
    padding: 4px 16px;
    border-radius: 2px;
    margin-bottom: 8px;
    font-family: "Courier New", "Source Code Pro", monospace;
  }

  .main-title {
    font-size: 26px;
    font-weight: 900;
    color: #3a3226;
    letter-spacing: 0.06em;
    line-height: 1.4;
  }

  .subtitle {
    font-size: 13px;
    color: #8a7e6e;
    margin-top: 4px;
    letter-spacing: 0.08em;
  }

  /* Comic panels - 4 horizontal */
  .comic-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 18px;
  }

  .panel {
    background: var(--panel-bg);
    border: 3px solid #3a3226;
    border-radius: 3px;
    padding: 16px 10px 12px;
    position: relative;
    overflow: hidden;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    transition: transform 0.2s;
    box-shadow: 3px 3px 0 rgba(58,50,38,0.08);
  }

  .panel:hover {
    transform: translateY(-2px);
    box-shadow: 5px 5px 0 rgba(58,50,38,0.12);
  }

  .panel-number {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 10px;
    font-weight: 900;
    color: #c4b8a4;
    font-family: "Courier New", monospace;
    letter-spacing: 0.05em;
  }

  .panel-time {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 11px;
    font-weight: 700;
    color: #b8a894;
  }

  /* ---------- Shared Scene ---------- */
  .scene-base {
    position: relative;
    width: 100%;
    height: 160px;
    margin-top: 18px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  /* ---------- Speech Bubble ---------- */
  .speech-bubble {
    position: absolute;
    background: #fff;
    border: 2px solid #3a3226;
    border-radius: 12px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 800;
    color: #3a3226;
    white-space: nowrap;
    z-index: 10;
    box-shadow: 2px 2px 0 rgba(58,50,38,0.08);
    line-height: 1.5;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    width: 10px;
    height: 6px;
    background: #fff;
    border-right: 2px solid #3a3226;
    border-bottom: 2px solid #3a3226;
    transform: rotate(45deg);
  }

  /* Thought bubble */
  .thought-cloud {
    position: absolute;
    background: #fff;
    border: 2px solid #3a3226;
    border-radius: 14px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #6b5f4e;
    z-index: 10;
    white-space: nowrap;
  }

  .thought-cloud::before {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 12px;
    width: 5px;
    height: 5px;
    background: #fff;
    border: 1.5px solid #3a3226;
    border-radius: 50%;
  }

  .thought-cloud::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 6px;
    width: 3px;
    height: 3px;
    background: #fff;
    border: 1.5px solid #3a3226;
    border-radius: 50%;
  }

  /* Floor shadow */
  .floor-shadow {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 6px;
    background: rgba(58,50,38,0.1);
    border-radius: 50%;
  }

  .floor-shadow.wide {
    width: 90px;
  }

  /* ---------- CSS Person ---------- */
  .person-head {
    width: 22px;
    height: 22px;
    background: var(--skin);
    border: 2px solid #3a3226;
    border-radius: 50%;
    position: relative;
    z-index: 2;
  }

  .person-head.hair::before {
    content: '';
    position: absolute;
    top: -4px;
    left: -3px;
    width: 28px;
    height: 14px;
    background: #3a3226;
    border-radius: 14px 14px 0 0;
    z-index: 3;
  }

  /* Happy eyes */
  .eyes-happy {
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
  }
  .eyes-happy .eye {
    width: 3px;
    height: 4px;
    background: #3a3226;
    border-radius: 50%;
    position: relative;
    top: -1px;
  }

  /* Open eyes */
  .eyes-open {
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
  }
  .eyes-open .eye {
    width: 4px;
    height: 5px;
    background: #fff;
    border: 1.5px solid #3a3226;
    border-radius: 50%;
    position: relative;
  }
  .eyes-open .eye::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 1px;
    width: 2px;
    height: 3px;
    background: #3a3226;
    border-radius: 50%;
  }

  /* Surprised eyes */
  .eyes-surprise {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
  }
  .eyes-surprise .eye {
    width: 5px;
    height: 6px;
    background: #fff;
    border: 1.5px solid #3a3226;
    border-radius: 50%;
    position: relative;
  }
  .eyes-surprise .eye::after {
    content: '';
    position: absolute;
    top: 0.5px;
    left: 1px;
    width: 2px;
    height: 2px;
    background: #3a3226;
    border-radius: 50%;
  }

  .mouth-smile {
    position: absolute;
    top: 13px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 3px;
    border-bottom: 1.5px solid #3a3226;
    border-radius: 0 0 50% 50%;
  }

  .mouth-small {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 2px;
    background: #3a3226;
    border-radius: 0 0 2px 2px;
  }

  .mouth-open-round {
    position: absolute;
    top: 13px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 4px;
    background: #3a3226;
    border-radius: 50%;
  }

  .person-body {
    background: #8bacbd;
    border: 2px solid #3a3226;
    border-radius: 10px 10px 6px 6px;
    position: relative;
    z-index: 1;
  }

  .arm {
    background: #8bacbd;
    border: 2px solid #3a3226;
    border-radius: 8px;
    position: absolute;
    z-index: 2;
  }

  .leg {
    background: #6b5f4e;
    border: 2px solid #3a3226;
    border-radius: 8px;
    position: absolute;
    z-index: 0;
    width: 10px;
    height: 20px;
  }

  /* Blush */
  .blush {
    position: absolute;
    top: 12px;
    width: 6px;
    height: 3px;
    background: rgba(224,85,61,0.25);
    border-radius: 50%;
    z-index: 5;
  }
  .blush-l { left: 2px; }
  .blush-r { right: 2px; }

  /* ---------- CSS Cat: Orange (default) ---------- */
  .cat-head {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 24px;
    background: var(--cat-orange);
    border: 2px solid #3a3226;
    border-radius: 50%;
    z-index: 3;
  }

  .cat-head::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 0;
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 11px solid var(--cat-orange);
    filter: drop-shadow(0 -1.5px 0 #3a3226);
  }

  .cat-head::after {
    content: '';
    position: absolute;
    top: -8px;
    right: 0;
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 11px solid var(--cat-orange);
    filter: drop-shadow(0 -1.5px 0 #3a3226);
  }

  .cat-eyes {
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 4;
  }

  .cat-eyes .cat-eye {
    width: 6px;
    height: 7px;
    background: #fff;
    border: 1.5px solid #3a3226;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
  }

  .cat-eyes .cat-eye::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 0.5px;
    width: 3px;
    height: 4px;
    background: #3a3226;
    border-radius: 50%;
  }

  .cat-nose {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 4px;
    background: var(--cat-nose);
    border: 1px solid #3a3226;
    border-radius: 50%;
    z-index: 4;
  }

  .cat-mouth {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 3px;
    border-bottom: 1.5px solid #3a3226;
    border-radius: 0 0 50% 50%;
    z-index: 4;
  }

  .cat-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 26px;
    background: var(--cat-orange);
    border: 2px solid #3a3226;
    border-radius: 20px 20px 8px 8px;
    z-index: 2;
  }

  .cat-body::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 9px;
    background: var(--cat-light);
    border-radius: 6px;
  }

  .cat-paw {
    position: absolute;
    bottom: -2px;
    width: 12px;
    height: 8px;
    background: var(--cat-orange);
    border: 2px solid #3a3226;
    border-radius: 50% 50% 40% 40%;
    z-index: 3;
  }
  .cat-paw-l { left: 10px; }
  .cat-paw-r { right: 10px; }

  .cat-tail {
    position: absolute;
    bottom: 6px;
    right: 2px;
    width: 18px;
    height: 7px;
    background: var(--cat-orange);
    border: 2px solid #3a3226;
    border-radius: 9px 9px 2px 2px;
    transform: rotate(25deg);
    transform-origin: left center;
    z-index: 1;
    animation: tailWag 1.5s ease-in-out infinite;
  }

  @keyframes tailWag {
    0%, 100% { transform: rotate(20deg); }
    50% { transform: rotate(40deg); }
  }

  .cat-whisker {
    position: absolute;
    height: 1.5px;
    background: #3a3226;
    z-index: 4;
    border-radius: 1px;
  }
  .cw-l1 { top: 13px; left: 2px; width: 10px; transform: rotate(-8deg); }
  .cw-l2 { top: 15px; left: 1px; width: 8px; transform: rotate(3deg); }
  .cw-r1 { top: 13px; right: 2px; width: 10px; transform: rotate(8deg); }
  .cw-r2 { top: 15px; right: 1px; width: 8px; transform: rotate(-3deg); }

  /* ---------- CSS Cat: White variant ---------- */
  .cat-white .cat-head {
    background: var(--cat-white);
  }
  .cat-white .cat-head::before {
    border-bottom-color: var(--cat-white);
    filter: drop-shadow(0 -1.5px 0 #3a3226);
  }
  .cat-white .cat-head::after {
    border-bottom-color: var(--cat-white);
    filter: drop-shadow(0 -1.5px 0 #3a3226);
  }
  .cat-white .cat-nose {
    background: var(--cat-pink);
  }
  .cat-white .cat-body {
    background: var(--cat-white);
  }
  .cat-white .cat-body::after {
    background: #f5f2ee;
  }
  .cat-white .cat-paw {
    background: var(--cat-white);
  }
  .cat-white .cat-tail {
    background: var(--cat-white);
  }

  /* ---------- CSS Cat: Angry variant ---------- */
  .cat-angry .cat-head::before {
    top: -2px;
    left: -9px;
    transform: rotate(-80deg);
    border-bottom-color: var(--cat-orange);
    filter: drop-shadow(0 -1.5px 0 #3a3226);
  }
  .cat-angry .cat-head::after {
    top: -2px;
    right: -9px;
    transform: rotate(80deg);
    border-bottom-color: var(--cat-orange);
    filter: drop-shadow(0 -1.5px 0 #3a3226);
  }
  .cat-angry .cat-eye-angry {
    width: 3px;
    height: 6px;
    background: #e8d830;
    border: 1.5px solid #3a3226;
    border-radius: 1px;
    position: relative;
    overflow: hidden;
  }
  .cat-angry .cat-eye-angry::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 1.5px;
    height: 5px;
    background: #3a3226;
    border-radius: 1px;
  }
  .cat-angry .cat-mouth-angry {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    gap: 2px;
  }
  .cat-angry .fang {
    width: 0;
    height: 0;
    border-left: 2px solid transparent;
    border-right: 2px solid transparent;
    border-top: 4px solid #fff;
    filter: drop-shadow(0 0 0 1px #3a3226);
  }
  .cat-angry .cat-tail-furious {
    position: absolute;
    bottom: 6px;
    right: 2px;
    width: 22px;
    height: 14px;
    background: var(--cat-orange);
    border: 2px solid #3a3226;
    border-radius: 4px;
    transform: rotate(35deg);
    transform-origin: left center;
    z-index: 1;
    animation: tailFurious 0.3s ease-in-out infinite;
    clip-path: polygon(0% 20%, 20% 0%, 40% 15%, 60% 0%, 80% 15%, 100% 0%, 100% 80%, 80% 65%, 60% 95%, 40% 65%, 20% 95%, 0% 80%);
  }

  @keyframes tailFurious {
    0%, 100% { transform: rotate(30deg); }
    25% { transform: rotate(45deg); }
    75% { transform: rotate(25deg); }
  }

  /* Anger marks */
  .anger-mark {
    position: absolute;
    font-size: 14px;
    font-weight: 900;
    color: #e0553d;
    z-index: 10;
    animation: angerPulse 0.5s ease-in-out infinite;
  }

  @keyframes angerPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  /* ---------- Panel 1: Person petting white cat, orange cat watching ---------- */
  .intro-scene {
    position: relative;
    width: 100%;
    height: 160px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .intro-group {
    position: relative;
    width: 100%;
    height: 130px;
  }

  .intro-person {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-30%);
    z-index: 2;
  }

  .intro-person .person-head {
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
  }

  .intro-person .person-body {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 32px;
    height: 32px;
    border-radius: 14px 14px 8px 8px;
  }

  /* Arm reaching to pet white cat */
  .pet-arm {
    position: absolute;
    top: 2px;
    right: -15px;
    width: 24px;
    height: 8px;
    background: #8bacbd;
    border: 2px solid #3a3226;
    border-radius: 8px;
    z-index: 4;
    transform: rotate(-15deg);
  }

  /* Hand */
  .pet-hand {
    position: absolute;
    top: -1px;
    right: -8px;
    width: 10px;
    height: 10px;
    background: var(--skin);
    border: 2px solid #3a3226;
    border-radius: 50%;
    z-index: 5;
  }

  /* White cat on lap */
  .white-cat-lap {
    position: absolute;
    bottom: 32px;
    left: 55%;
    transform: translateX(-20%);
    width: 55px;
    height: 44px;
  }

  .white-cat-lap .cat-head {
    width: 24px;
    height: 20px;
  }

  .white-cat-lap .cat-body {
    width: 36px;
    height: 22px;
  }

  .white-cat-lap .cat-paw {
    width: 10px;
    height: 7px;
  }
  .white-cat-lap .cat-paw-l { left: 8px; }
  .white-cat-lap .cat-paw-r { right: 8px; }

  /* Closed happy eyes for white cat */
  .cat-eyes-closed {
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 4;
  }
  .cat-eyes-closed span {
    width: 5px;
    height: 2px;
    background: #3a3226;
    border-radius: 1px;
    margin-top: 3px;
  }

  /* Orange cat watching from corner */
  .orange-cat-corner {
    position: absolute;
    bottom: 4px;
    left: 8px;
    width: 50px;
    height: 42px;
    z-index: 1;
  }

  .orange-cat-corner .cat-head {
    width: 22px;
    height: 18px;
  }

  .orange-cat-corner .cat-body {
    width: 32px;
    height: 20px;
  }

  .orange-cat-corner .cat-paw {
    width: 9px;
    height: 6px;
  }
  .orange-cat-corner .cat-paw-l { left: 6px; }
  .orange-cat-corner .cat-paw-r { right: 6px; }

  /* One ear slightly turned */
  .ear-turned::before {
    transform: rotate(-15deg) !important;
  }

  /* Heart particles */
  .heart-particle {
    position: absolute;
    font-size: 12px;
    z-index: 6;
    animation: heartFloat 1.5s ease-in-out infinite;
  }
  .hp1 { top: -8px; right: 8px; animation-delay: 0s; }
  .hp2 { top: -4px; right: 20px; animation-delay: 0.5s; font-size: 10px; }
  .hp3 { top: 2px; right: 30px; animation-delay: 1s; font-size: 8px; }

  @keyframes heartFloat {
    0%, 100% { transform: translateY(0); opacity: 0.8; }
    50% { transform: translateY(-8px); opacity: 0.3; }
  }

  /* Observe lines */
  .observe-line {
    position: absolute;
    background: rgba(58,50,38,0.15);
    z-index: 3;
    border-radius: 2px;
  }
  .obs1 { top: 20px; left: 36px; width: 40px; height: 1px; transform: rotate(-5deg); }
  .obs2 { top: 24px; left: 34px; width: 44px; height: 1px; transform: rotate(2deg); }
  .obs3 { top: 28px; left: 36px; width: 38px; height: 1px; transform: rotate(-2deg); }

  /* ---------- Panel 2: Close-up angry orange cat ---------- */
  .angry-scene {
    position: relative;
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  .angry-cat-big {
    position: relative;
    width: 90px;
    height: 74px;
  }

  .angry-cat-big .cat-head {
    width: 36px;
    height: 30px;
  }

  .angry-cat-big .cat-head::before {
    top: -2px;
    left: -8px;
    border-left-width: 7px;
    border-right-width: 7px;
    border-bottom-width: 13px;
    transform: rotate(-75deg);
  }

  .angry-cat-big .cat-head::after {
    top: -2px;
    right: -8px;
    border-left-width: 7px;
    border-right-width: 7px;
    border-bottom-width: 13px;
    transform: rotate(75deg);
  }

  .angry-cat-big .cat-eye-angry {
    width: 4px;
    height: 8px;
    background: #f5e56c;
    border: 1.5px solid #3a3226;
    border-radius: 1px;
    position: relative;
  }
  .angry-cat-big .cat-eye-angry::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 0.5px;
    width: 2px;
    height: 6px;
    background: #3a3226;
    border-radius: 1px;
  }
