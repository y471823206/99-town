<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>久久小镇 · 夏夜晚风</title>
<style>
  :root {
    --bg: #faf7f2;
    --ink: #1a1a1a;
    --clay: #c4553b;
    --night-top: #1a1a2e;
    --night-bottom: #16213e;
    --moon: #f5e6c8;
    --firefly: #e8d44d;
    --rooftop: #2d2420;
    --cat-silhouette: #1a1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Noto Sans SC", "LXGW WenKai", "STSong", "SimSun", "Microsoft YaHei", serif;
    background: #e8e2d4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .poster {
    width: 600px;
    max-width: 100%;
    background: var(--bg);
    border: 4px solid var(--ink);
    position: relative;
    overflow: hidden;
    box-shadow:
      10px 10px 0 rgba(26,26,26,0.08),
      20px 20px 0 rgba(26,26,26,0.03);
  }

  /* ═══════════════ Night Sky ═══════════════ */
  .sky {
    position: relative;
    width: 100%;
    height: 420px;
    background: linear-gradient(180deg, #1a1a2e 0%, #1e2a4a 30%, #2d3a5c 60%, #3d4f6e 100%);
    overflow: hidden;
  }

  /* Stars */
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Moon */
  .moon {
    position: absolute;
    top: 40px;
    right: 60px;
    width: 80px;
    height: 80px;
    background: var(--moon);
    border-radius: 50%;
    box-shadow:
      0 0 30px rgba(245,230,200,0.5),
      0 0 60px rgba(245,230,200,0.25),
      0 0 100px rgba(245,230,200,0.12);
    animation: moonGlow 4s ease-in-out infinite;
  }

  .moon::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 12px;
    width: 18px;
    height: 18px;
    background: rgba(220,200,160,0.4);
    border-radius: 50%;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: 44px;
    left: 28px;
    width: 10px;
    height: 10px;
    background: rgba(220,200,160,0.3);
    border-radius: 50%;
  }

  @keyframes moonGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(245,230,200,0.5), 0 0 60px rgba(245,230,200,0.25), 0 0 100px rgba(245,230,200,0.12); }
    50% { box-shadow: 0 0 40px rgba(245,230,200,0.7), 0 0 80px rgba(245,230,200,0.35), 0 0 120px rgba(245,230,200,0.18); }
  }

  /* Fireflies */
  .firefly {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--firefly);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--firefly), 0 0 16px rgba(232,212,77,0.5);
    animation: fireflyFloat 6s ease-in-out infinite;
  }

  @keyframes fireflyFloat {
    0%, 100% { transform: translate(0, 0); opacity: 0.2; }
    20% { transform: translate(20px, -30px); opacity: 0.9; }
    40% { transform: translate(-15px, -60px); opacity: 0.4; }
    60% { transform: translate(30px, -40px); opacity: 0.8; }
    80% { transform: translate(-10px, -20px); opacity: 0.3; }
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.06);
    border-radius: 50px;
  }

  /* ═══════════════ Rooftop ═══════════════ */
  .rooftop {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50px;
    background: var(--rooftop);
    clip-path: polygon(0% 100%, 0% 40%, 15% 0%, 30% 40%, 45% 0%, 60% 40%, 75% 0%, 90% 40%, 100% 40%, 100% 100%);
  }

  .rooftop-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: #1a1a1a;
  }

  /* ═══════════════ Cat Silhouette ═══════════════ */
  .cat-silhouette {
    position: absolute;
    bottom: 42px;
    left: 50%;
    transform: translateX(-50%);
  }

  .cat-body-sil {
    width: 36px;
    height: 28px;
    background: var(--cat-silhouette);
    border-radius: 50% 50% 30% 30%;
    position: relative;
  }

  .cat-head-sil {
    width: 28px;
    height: 24px;
    background: var(--cat-silhouette);
    border-radius: 50%;
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Ears */
  .cat-head-sil::before {
    content: '';
    position: absolute;
    top: -9px;
    left: 1px;
    width: 0;
    height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 12px solid var(--cat-silhouette);
  }
  .cat-head-sil::after {
    content: '';
    position: absolute;
    top: -9px;
    right: 1px;
    width: 0;
    height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 12px solid var(--cat-silhouette);
  }

  /* Tail */
  .cat-tail-sil {
    position: absolute;
    bottom: 0;
    right: -10px;
    width: 24px;
    height: 5px;
    background: var(--cat-silhouette);
    border-radius: 10px;
    transform-origin: left center;
    transform: rotate(40deg);
    animation: tailSway 3s ease-in-out infinite;
  }

  @keyframes tailSway {
    0%, 100% { transform: rotate(40deg); }
    50% { transform: rotate(55deg); }
  }

  /* ═══════════════ Typography Block ═══════════════ */
  .text-block {
    padding: 36px 32px 28px;
    position: relative;
  }

  .label-strip {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--clay);
    text-transform: uppercase;
    border-bottom: 2px solid var(--clay);
    padding-bottom: 4px;
    margin-bottom: 16px;
  }

  .poem-title {
    font-size: 32px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: 0.08em;
    line-height: 1.3;
    margin-bottom: 14px;
  }

  .poem-title .accent {
    color: var(--clay);
  }

  .haiku {
    font-size: 16px;
    color: #5a5044;
    line-height: 2.2;
    letter-spacing: 0.06em;
    font-family: "LXGW WenKai", "STKaiti", "KaiTi", "Noto Serif SC", serif;
    margin-bottom: 8px;
  }

  .haiku .em {
    color: var(--clay);
    font-weight: 700;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--clay);
    margin: 16px 0;
    opacity: 0.5;
  }

  .footer-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: #8a8074;
    letter-spacing: 0.05em;
    padding-top: 12px;
    border-top: 1px solid #e8e0d4;
  }

  .footer-line .brand {
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.1em;
  }

  .footer-line .dot-sep {
    width: 4px;
    height: 4px;
    background: var(--clay);
    border-radius: 50%;
    opacity: 0.6;
  }

  /* ═══════════════ Window Lights ═══════════════ */
  .window-light {
    position: absolute;
    background: rgba(245,200,100,0.7);
    border-radius: 1px;
    animation: windowFlicker 4s ease-in-out infinite;
  }

  @keyframes windowFlicker {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0.9; }
  }

  /* ═══════════════ Responsive ═══════════════ */
  @media (max-width: 640px) {
    .poster { width: 100%; }
    .sky { height: 320px; }
    .poem-title { font-size: 24px; }
    .haiku { font-size: 14px; }
    .text-block { padding: 28px 20px 22px; }
    .moon { top: 30px; right: 30px; width: 60px; height: 60px; }
  }
</style>
</head>
<body>

<div class="poster">

  <!-- Night Sky -->
  <div class="sky">
    <!-- Stars -->
    <div class="star" style="top:8%;left:12%;animation-delay:0s;"></div>
    <div class="star" style="top:15%;left:25%;animation-delay:0.6s;width:1.5px;height:1.5px;"></div>
    <div class="star" style="top:6%;left:40%;animation-delay:1.2s;"></div>
    <div class="star" style="top:20%;left:55%;animation-delay:1.8s;width:1.5px;height:1.5px;"></div>
    <div class="star" style="top:10%;left:70%;animation-delay:0.3s;"></div>
    <div class="star" style="top:25%;left:82%;animation-delay:0.9s;width:1.5px;height:1.5px;"></div>
    <div class="star" style="top:5%;left:50%;animation-delay:1.5s;"></div>
    <div class="star" style="top:18%;left:34%;animation-delay:2.1s;width:1.5px;height:1.5px;"></div>
    <div class="star" style="top:12%;left:60%;animation-delay:0.4s;width:2.5px;height:2.5px;"></div>
    <div class="star" style="top:22%;left:15%;animation-delay:1.7s;"></div>
    <div class="star" style="top:8%;left:90%;animation-delay:2.4s;width:1.5px;height:1.5px;"></div>
    <div class="star" style="top:28%;left:45%;animation-delay:1.1s;width:2px;height:2px;"></div>

    <!-- Moon -->
    <div class="moon"></div>

    <!-- Clouds -->
    <div class="cloud" style="top:50px;left:-40px;width:120px;height:30px;animation: cloudDrift 20s linear infinite;"></div>
    <div class="cloud" style="top:80px;left:200px;width:80px;height:20px;opacity:0.5;animation: cloudDrift 25s linear infinite;animation-delay:-10s;"></div>

    <!-- Fireflies -->
    <div class="firefly" style="top:60%;left:10%;animation-delay:0s;"></div>
    <div class="firefly" style="top:50%;left:30%;animation-delay:1.5s;width:4px;height:4px;"></div>
    <div class="firefly" style="top:65%;left:50%;animation-delay:3s;"></div>
    <div class="firefly" style="top:45%;left:70%;animation-delay:2s;width:5px;height:5px;"></div>
    <div class="firefly" style="top:55%;left:85%;animation-delay:4s;width:4px;height:4px;"></div>
    <div class="firefly" style="top:70%;left:40%;animation-delay:0.8s;"></div>

    <!-- Rooftop -->
    <div class="rooftop"></div>
    <div class="rooftop-line"></div>

    <!-- Window lights on building silhouettes -->
    <div class="window-light" style="bottom:56px;left:50px;width:8px;height:10px;"></div>
    <div class="window-light" style="bottom:56px;left:70px;width:8px;height:10px;animation-delay:1.5s;"></div>
    <div class="window-light" style="bottom:56px;left:460px;width:8px;height:10px;animation-delay:0.7s;"></div>
    <div class="window-light" style="bottom:56px;left:490px;width:8px;height:10px;animation-delay:2.2s;"></div>
    <div class="window-light" style="bottom:56px;left:520px;width:8px;height:10px;animation-delay:0.3s;"></div>

    <!-- Cat silhouette -->
    <div class="cat-silhouette">
      <div class="cat-body-sil">
        <div class="cat-head-sil"></div>
        <div class="cat-tail-sil"></div>
      </div>
    </div>
  </div>

  <!-- Text -->
  <div class="text-block">
    <div class="label-strip">久久小镇 · 夏夜</div>

    <div class="poem-title">
      晚风知道<br>猫的<span class="accent">秘密</span>
    </div>

    <div class="divider"></div>

    <div class="haiku">
      屋顶上，猫望着月亮<br>
      萤火虫提着灯笼<br>
      替晚风<span class="em">送信</span>
    </div>

    <div class="footer-line">
      <span>2026.07.04</span>
      <span class="dot-sep"></span>
      <span class="brand">久久小镇</span>
      <span class="dot-sep"></span>
      <span>阿画 作品</span>
    </div>
  </div>

</div>

<!-- Cloud drift keyframes -->
<style>
  @keyframes cloudDrift {
    0% { transform: translateX(0); }
    100% { transform: translateX(700px); }
  }
</style>

</body>
</html>
