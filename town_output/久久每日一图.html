这是您要的“久久每日一图”像素风海报HTML代码。它采用温暖米白底色，以陶土红与炭黑色块构建了小镇的宁静日常。
```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>久久 · 每日一图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'IBM Plex Mono', 'Menlo', monospace;
            padding: 20px;
        }

        /* 米白底主海报——像素风温暖容器 */
        .poster {
            max-width: 800px;
            width: 100%;
            background-color: #faf7f2;  /* 米白基底 */
            border: 6px solid #1a1a1a;
            box-shadow: 16px 16px 0 #1a1a1a;
            padding: 32px 28px 38px 28px;
            position: relative;
            transition: all 0.15s ease;
            image-rendering: pixelated;
            /* 伪像素纹理（微妙的网格） */
            background-image: 
                linear-gradient(#e0dcd5 1px, transparent 1px),
                linear-gradient(90deg, #e0dcd5 1px, transparent 1px);
            background-size: 16px 16px, 16px 16px;
            background-position: -1px -1px, -1px -1px;
        }

        /* 内容布局——typography first */
        .poster-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
        }

        /* -- 像素装饰带 (陶土红 + 炭黑) -- */
        .pixel-strip {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .pixel-strip span {
            display: block;
            width: 16px;
            height: 16px;
            background-color: #c4553b; /* 陶土红 */
            border: 2px solid #1a1a1a;
            box-shadow: 2px 2px 0 #1a1a1a;
        }
        .pixel-strip span.black {
            background-color: #1a1a1a;
            border-color: #1a1a1a;
            box-shadow: 2px 2px 0 #1f1f1f;
        }
        .pixel-strip span.empty {
            background-color: transparent;
            border: 2px solid transparent;
            box-shadow: none;
        }

        /* ---- TYPOGRAPHY 核心 (像素风味标题) ---- */
        .title-main {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #1a1a1a;
            line-height: 1;
            margin: 0 0 6px 0;
            font-family: 'Courier New', 'Lucida Console', monospace;
            text-shadow: 6px 6px 0 #c4553b;
            word-break: break-word;
        }
        /* 标题中的陶土红强调 */
        .title-main span {
            color: #c4553b;
            text-shadow: 6px 6px 0 #1a1a1a;
        }

        .subhead {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1a1a1a;
            background-color: #c4553b;
            display: inline-block;
            padding: 6px 16px 8px 16px;
            margin-top: 4px;
            margin-bottom: 28px;
            border: 4px solid #1a1a1a;
            box-shadow: 6px 6px 0 #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            image-rendering: pixelated;
        }

        /* 每日一图 核心排版 */
        .daily-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin: 16px 0 24px 0;
            border-top: 4px dashed #1a1a1a;
            border-bottom: 4px dashed #1a1a1a;
            padding: 10px 0 14px 0;
            width: 100%;
        }
        .daily-line {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px 14px;
        }
        .daily-label {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
            background: #faf7f2;
            padding: 0 8px 0 0;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
        }
        .daily-label span {
            background-color: #c4553b;
            color: #faf7f2;
            padding: 0 12px 4px 12px;
            border: 3px solid #1a1a1a;
            margin-right: 8px;
            display: inline-block;
        }
        .daily-figure {
            font-size: 3.8rem;
            font-weight: 800;
            color: #c4553b;
            background: #1a1a1a;
            padding: 0 16px 2px 16px;
            line-height: 1.2;
            letter-spacing: 4px;
            border: 4px solid #1a1a1a;
            box-shadow: 6px 6px 0 #c4553b;
            font-family: 'Courier New', monospace;
        }
        .daily-desc {
            font-size: 1.3rem;
            font-weight: 500;
            color: #1a1a1a;
            border-left: 8px solid #c4553b;
            padding-left: 16px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* 像素小镇信息 */
        .town-info {
            margin: 28px 0 18px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 4px solid #1a1a1a;
            padding-top: 24px;
        }
        .town-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #c4553b;
            background: #1a1a1a;
            padding: 0 14px 4px 14px;
            border: 4px solid #1a1a1a;
            box-shadow: 6px 6px 0 #c4553b;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-family: 'Courier New', monospace;
        }
        .town-name small {
            font-size: 1rem;
            color: #faf7f2;
            background: #c4553b;
            padding: 0 6px;
            margin-left: 6px;
        }
        .town-weather {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #faf7f2;
            border: 4px solid #1a1a1a;
            padding: 6px 16px 6px 16px;
            box-shadow: 4px 4px 0 #c4553b;
        }
        .town-weather span {
            font-size: 2rem;
            line-height: 1;
        }

        /* 像素小人 / 阿画 signature */
        .signature-block {
            display: flex;
            align-items: center;
            gap: 10px 24px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .pixel-avatar {
            display: flex;
            gap: 4px;
            background: #1a1a1a;
            padding: 8px 12px 8px 12px;
            border: 4px solid #c4553b;
        }
        .avatar-px {
            display: grid;
            grid-template-columns: repeat(8, 10px);
            gap: 2px;
            background: #c4553b;
            padding: 4px;
        }
        .avatar-px i {
            display: block;
            width: 10px;
            height: 10px;
            background: #faf7f2;
            border: 1px solid #1a1a1a;
        }
        .avatar-px i.fill {
            background: #1a1a1a;
            border-color: #1a1a1a;
        }
        .avatar-px i.accent {
            background: #c4553b;
            border-color: #1a1a1a;
        }
        .avatar-px i.blank {
            background: transparent;
            border: 1px solid transparent;
        }

        .signature-text {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #1a1a1a;
            border-bottom: 6px solid #c4553b;
            padding-bottom: 2px;
            font-family: 'Courier New', monospace;
        }
        .signature-text span {
            background: #1a1a1a;
            color: #faf7f2;
            padding: 0 8px;
        }

        /* 底部像素装饰 */
        .footer-pixel {
            display: flex;
            justify-content: flex-end;
            margin-top: 22px;
            gap: 4px;
        }
        .footer-pixel span {
            width: 14px;
            height: 14px;
            background: #c4553b;
            border: 2px solid #1a1a1a;
        }
        .footer-pixel span.b {
            background: #1a1a1a;
        }
        .footer-pixel span.w {
            background: #faf7f2;
            border-color: #c4553b;
        }

        /* 响应式修正 */
        @media (max-width: 600px) {
            .poster {
                padding: 20px 16px 28px 16px;
                border-width: 4px;
                box-shadow: 10px 10px 0 #1a1a1a;
            }
            .title-main {
                font-size: 2.8rem;
                letter-spacing: 2px;
                text-shadow: 4px 4px 0 #c4553b;
            }
            .subhead {
                font-size: 1.2rem;
                padding: 4px 10px 6px 10px;
            }
            .daily-figure {
                font-size: 2.6rem;
                padding: 0 10px 0 10px;
            }
            .daily-label {
                font-size: 1.6rem;
            }
            .town-name {
                font-size: 1.5rem;
            }
            .town-weather {
                font-size: 1rem;
                padding: 4px 12px;
            }
            .signature-text {
                font-size: 1.2rem;
            }
            .pixel-strip span {
                width: 12px;
                height: 12px;
            }
            .avatar-px {
                grid-template-columns: repeat(8, 8px);
            }
            .avatar-px i {
                width: 8px;
                height: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="poster-content">
            <!-- 像素条 ── 陶土红 + 炭黑节奏 -->
            <div class="pixel-strip">
                <span></span><span class="black"></span><span></span><span class="black"></span><span></span><span class="empty"></span>
                <span></span><span></span><span class="black"></span><span></span><span class="black"></span><span></span>
                <span class="empty"></span><span></span><span class="black"></span><span></span><span class="black"></span><span></span>
            </div>

            <!-- 主标题 typography first -->
            <h1 class="title-main">
                久久<span>小镇</span>
            </h1>
            <div class="subhead">
                ✦ 像素风 · 温暖日常 ✦
            </div>

            <!-- 每日
