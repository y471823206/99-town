<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>久久小镇</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
:root {
  --paper:#faf7f2;
  --ink:#1a1a1a;
  --line:#3a2a24;
  --cream:#fff8ea;
  --accent:#c4553b;
  --amber:#d6a645;
  --accent-red:#c4553b;
  --accent-teal:#65a094;
  --text:#2f251f;
  --muted:#725f55;
  --panel:#fff8ea;
  --radius:0;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background:var(--paper); font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  color:var(--ink); image-rendering:pixelated;
}
.pixel-town-stage { position:fixed; inset:0; overflow:hidden; background:#efe4d2; }
.town-canvas { position:absolute; inset:0; width:100%; height:100%; display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
.town-hud { position:absolute; inset:22px 28px auto 28px; z-index:5; display:flex; justify-content:space-between; align-items:flex-start; gap:18px; pointer-events:none; }
.pixel-panel, .town-card, .resident-chip, .modal, .toast {
  background:rgba(255,248,234,.94); border:3px solid var(--line); box-shadow:6px 6px 0 rgba(58,42,36,.18); color:var(--ink);
}
.town-brand { min-width:260px; padding:14px 18px 12px; pointer-events:auto; }
.town-brand h1 { font-size:25px; line-height:1; letter-spacing:2px; font-weight:900; color:var(--ink); }
.town-brand p { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
.town-actions { display:flex; gap:10px; pointer-events:auto; }
.ghost-btn, .pixel-btn, .reminder-action {
  border:3px solid var(--line); background:var(--cream); color:var(--ink); font-weight:800; font-size:13px;
  padding:10px 13px; box-shadow:4px 4px 0 rgba(58,42,36,.22); cursor:pointer; border-radius:0;
}
.ghost-btn:hover, .pixel-btn:hover, .reminder-action:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 rgba(58,42,36,.22); }
.pixel-btn.primary { background:var(--accent); color:#fff8ea; }
.town-speech { position:absolute; left:112px; top:132px; z-index:4; width:350px; padding:14px 15px; }
.town-speech:after { content:""; position:absolute; left:35px; bottom:-15px; width:18px; height:18px; background:rgba(255,248,234,.96); border-right:3px solid var(--line); border-bottom:3px solid var(--line); transform:rotate(45deg); }
.guardian-kicker, .status-title, .dash-label { font-size:11px; letter-spacing:2px; color:var(--accent); font-weight:900; }
.guardian-advice { font-size:15px; line-height:1.55; font-weight:750; margin-top:7px; }
.town-board { position:absolute; right:28px; bottom:26px; z-index:4; width:340px; padding:15px; }
.town-stat { display:grid; grid-template-columns:26px 1fr; gap:9px; border-top:2px solid #eadbc8; padding:10px 0; background:transparent; text-align:left; width:100%; }
.town-stat:first-of-type { border-top:0; padding-top:0; }
.stat-dot { width:18px; height:18px; border:3px solid var(--line); margin-top:2px; box-shadow:2px 2px 0 rgba(58,42,36,.16); background:var(--amber); }
.stat-dot.red { background:var(--accent); } .stat-dot.green { background:var(--accent-teal); }
.dash-value { font-size:22px; line-height:1; font-weight:900; color:var(--ink); margin-right:6px; }
.dash-hint { font-size:12px; color:var(--muted); line-height:1.45; }
.town-dock { position:absolute; left:28px; bottom:26px; z-index:4; display:flex; gap:10px; align-items:flex-end; }
.resident-chip { width:128px; padding:10px; cursor:pointer; }
.resident-chip:hover, .resident-chip.active { transform:translateY(-6px); background:#fff2d3; }
.agent-mini { display:block; }
.agent-mini .avatar { width:28px; height:28px; border:3px solid var(--line); box-shadow:2px 2px 0 rgba(58,42,36,.18); margin-bottom:8px; display:flex; align-items:center; justify-content:center; font-size:0; }
.agent-mini .name { font-size:13px; font-weight:900; color:var(--ink); }
.agent-mini .status { font-size:11px; color:var(--muted); line-height:1.4; white-space:normal; overflow:hidden; display:block; margin-top:4px; }
.agent-mini .score { display:none; }
.town-log { position:absolute; left:50%; bottom:26px; transform:translateX(-50%); z-index:4; width:min(420px,32vw); padding:10px 12px; font-size:12px; max-height:74px; overflow:hidden; }
.log-feed { font-size:12px; line-height:1.55; color:#5d4b42; }
.log-feed .entry { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.log-feed .time { color:var(--accent); margin-right:6px; font-weight:800; }
.map-legend { display:none; }
.legend-pill { display:inline-block; }
.reminder-list { display:none; }
.reminder-item { border:1px solid rgba(58,42,36,.18); padding:10px; margin-bottom:8px; }
.reminder-title { font-size:13px; font-weight:800; }
.reminder-meta { font-size:11px; color:var(--muted); line-height:1.5; margin-top:4px; }
/* Modal overlay */
.modal-overlay { position:fixed; inset:0; background:rgba(30,22,18,0.62); z-index:100; display:none; justify-content:center; align-items:center; padding:22px; }
.modal-overlay.show { display:flex; }
.modal { width:min(920px,92vw); max-height:86vh; overflow-y:auto; padding:24px; min-height:400px; position:relative; }
.modal h2 { color:var(--ink); font-size:20px; letter-spacing:2px; margin-bottom:18px; text-align:center; }
.modal .close { position:absolute; top:14px; right:18px; background:none; border:none; color:var(--ink); font-size:24px; cursor:pointer; }
.tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.tab { flex:1; min-width:94px; padding:10px; text-align:center; cursor:pointer; font-size:13px; letter-spacing:1px; background:#f1e5d2; border:2px solid var(--line); color:var(--muted); transition:all 0.2s; }
.tab:hover { background:#fff2d3; }
.tab.active { background:var(--accent); color:#fff8ea; }
.quest-item { padding:12px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start; border:2px solid rgba(58,42,36,.22); background:rgba(255,253,248,.6); }
.quest-item .q-status { width:10px; height:10px; margin-top:6px; flex-shrink:0; border:2px solid var(--line); }
.quest-item .q-status.pending { background:var(--muted); }
.quest-item .q-status.processing { background:var(--accent-teal); animation:pulse 1.5s infinite; }
.quest-item .q-status.done { background:#7ba88b; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.quest-item .q-info { flex:1; }
.quest-item .q-title { font-size:14px; font-weight:800; }
.quest-item .q-agent { font-size:11px; opacity:0.68; margin-top:3px; }
.quest-item .q-meta { font-size:11px; margin-top:4px; display:flex; gap:12px; color:var(--muted); }
.quest-item .q-rating { font-size:13px; }
.quest-item .q-rating.excellent { color:#b78318; }
.quest-item .q-rating.good { color:#3f8177; }
.quest-item .q-rating.ok { color:var(--muted); }
.quest-item .q-rating.poor { color:var(--accent); }
.score-row { display:flex; align-items:center; gap:10px; padding:12px; margin-bottom:6px; border:2px solid rgba(58,42,36,.18); position:relative; background:rgba(255,253,248,.58); }
.score-row.rank-1 { border-color:var(--amber); background:#fff2d3; }
.score-rank { font-size:24px; font-weight:900; width:36px; text-align:center; color:var(--muted); }
.score-rank.gold { color:var(--amber); }
.score-name { flex:1; font-weight:800; }
.score-pts { font-size:24px; font-weight:900; color:var(--accent); }
.score-bar-wrap { height:5px; background:#eadbc8; margin-top:4px; }
.score-bar { height:100%; background:var(--accent); transition:width 0.5s; }
.pub-form { display:flex; gap:8px; margin-top:8px; }
.pub-form input { flex:1; background:#fffdf8; border:2px solid var(--line); padding:10px 14px; color:var(--ink); font-size:14px; outline:none; }
.pub-form input:focus { border-color:var(--accent); }
.pub-form button { background:var(--accent); color:#fff8ea; border:2px solid var(--line); padding:10px 20px; font-weight:800; cursor:pointer; font-size:14px; }
.building-tip { position:absolute; display:none; background:var(--panel); border:2px solid var(--line); padding:8px 14px; font-size:13px; pointer-events:none; z-index:50; }
.rate-btns { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.rate-btn { padding:5px 12px; border:2px solid var(--line); background:#fffdf8; color:var(--ink); cursor:pointer; font-size:12px; transition:all 0.2s; }
.rate-btn:hover { background:#fff2d3; }
.rate-btn.sel-excellent { background:#ffe18a; }
.rate-btn.sel-good { background:#d8eee6; }
.rate-btn.sel-ok { background:#f1e5d2; }
.rate-btn.sel-poor { background:#f0c5ba; }
.toast-container { position:fixed; top:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px; }
.toast { padding:14px 18px; font-size:13px; animation:slideIn 0.3s ease; max-width:320px; }
.toast .toast-agent { color:var(--accent); font-weight:800; }
.toast .toast-action { font-size:11px; opacity:0.7; margin-top:4px; cursor:pointer; color:#3f8177; text-decoration:underline; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
.asset-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.asset-card { background:rgba(255,253,248,.65); border:2px solid rgba(58,42,36,.18); padding:12px; cursor:pointer; transition:all 0.2s; }
.asset-card:hover { border-color:var(--accent-teal); background:#eef6ef; }
.asset-card .asset-type { font-size:10px; letter-spacing:2px; color:#3f8177; margin-bottom:4px; }
.asset-card .asset-name { font-size:13px; font-weight:800; margin-bottom:4px; }
.asset-card .asset-meta { font-size:11px; opacity:0.55; }
.badge { display:inline-block; background:var(--accent); color:#fff; padding:1px 7px; font-size:10px; font-weight:800; animation:pulse 2s infinite; }
.lifecycle-note { font-size:11px; color:var(--muted); line-height:1.6; margin-bottom:10px; }
.stage-chip { display:inline-block; border:1px solid rgba(58,42,36,.25); padding:2px 8px; margin-right:6px; font-size:10px; color:var(--muted); }
.todo-empty { opacity:0.55; text-align:center; padding:22px; }
@media (max-width: 1080px) {
  .town-hud { left:14px; right:14px; top:14px; }
  .town-brand { min-width:0; width:240px; }
  .town-actions { flex-direction:column; }
  .town-board { right:14px; bottom:14px; width:300px; }
  .town-dock { left:14px; right:14px; bottom:14px; overflow-x:auto; padding-bottom:6px; }
  .resident-chip { min-width:116px; }
  .town-log { display:none; }
  .town-speech { left:28px; top:118px; width:min(340px,calc(100vw - 56px)); }
}
</style>
</head>
<body>

<main class="pixel-town-stage" id="pixel-town-stage" aria-label="久久小镇全屏像素世界">
  <canvas class="town-canvas" id="map" width="780" height="520"></canvas>

  <section class="town-hud" aria-label="小镇状态栏">
    <div class="pixel-panel town-brand">
      <h1>久久小镇</h1>
      <p>一个会运转、会交付、会记住评价的 AI 居民小镇。</p>
    </div>
    <div class="town-actions">
      <button class="ghost-btn" onclick="openGallery()">作品长廊</button>
    </div>
  </section>

  <aside class="pixel-panel town-speech" aria-label="北北提醒">
    <div class="guardian-kicker">北北守护灵</div>
    <div class="guardian-advice" id="guardian-advice">正在观察小镇...</div>
  </aside>

  <aside class="pixel-panel town-board" aria-label="今日小镇">
    <div class="status-title">今日小镇</div>
    <div class="town-stat">
      <i class="stat-dot red"></i><div><span class="dash-label">待处理</span><b class="dash-value" id="stat-pending">0</b><span class="dash-hint">悬赏与执行队列</span></div>
    </div>
    <div class="town-stat">
      <i class="stat-dot red"></i><div><span class="dash-label">未评分</span><b class="dash-value" id="stat-unrated">0</b><span class="dash-hint">评价会沉淀为成长</span></div>
    </div>
    <div class="town-stat">
      <i class="stat-dot green"></i><div><span class="dash-label">今日交付</span><b class="dash-value" id="stat-today-done">0</b><span class="dash-hint">今天完成的作品</span></div>
    </div>
    <div class="town-stat">
      <i class="stat-dot"></i><div><span class="dash-label">健康度</span><b class="dash-value" id="stat-health">100</b><span class="dash-hint">待办与反馈压力</span></div>
    </div>
    <span style="display:none"><b id="stat-tasks">0</b><b id="stat-done">0</b><b id="stat-day">0</b></span>
    <div id="reminder-list" class="reminder-list"></div>
  </aside>

  <nav class="town-dock" aria-label="居民状态" id="agent-list"></nav>
  <aside class="pixel-panel town-log" aria-label="小镇日报"><div class="log-feed" id="log-feed"></div></aside>
  <div class="map-legend" id="map-legend"></div>
</main>

<!-- Town Hall Modal -->
<div class="modal-overlay" id="townhall-modal">
  <div class="modal" style="position:relative;">
    <button class="close" onclick="closeModal()" style="position:absolute;">✕</button>
    <h2>🏛️ 市政厅</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('todo')">待办</div>
      <div class="tab" onclick="switchTab('quests')">悬赏板</div>
      <div class="tab" onclick="switchTab('history')">交付 / 任务记录</div>
      <div class="tab" onclick="switchTab('zouzhe')">奏折</div>
      <div class="tab" onclick="switchTab('explore')">探索</div>
      <div class="tab" onclick="switchTab('scores')">成长 / 智库</div>
    </div>
    <div id="tab-todo"></div>
    <div id="tab-quests" style="display:none;">
      <div class="pub-form">
        <input id="pub-input" placeholder="发布新悬赏，如：设计一张海报..." onkeydown="if(event.key==='Enter')publish()">
        <button onclick="publish()">发布</button>
      </div>
      <div id="active-quests" style="margin-top:14px;"></div>
    </div>
    <div id="tab-history" style="display:none;"></div>
    <div id="tab-zouzhe" style="display:none;"></div>
    <div id="tab-explore" style="display:none;"></div>
    <div id="tab-scores" style="display:none;"></div>
  </div>
</div>

<!-- Library Modal -->
<div class="modal-overlay" id="library-modal">
  <div class="modal" style="position:relative;">
    <button class="close" onclick="closeLibrary()" style="position:absolute;">✕</button>
    <h2>📚 智库 · 小镇资产</h2>
    <p style="font-size:12px;opacity:0.4;text-align:center;margin-bottom:16px;">所有产出自动沉淀，无需去D盘翻找</p>
    <div class="asset-grid" id="asset-grid"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
// ============================================================
// Town Data
// ============================================================
const API = 'http://localhost:8700';
let townState = window.__INIT_STATE__ || { tasks: [], agents: {}, quests: [], log: [], scoring_rules: {} };

async function fetchState() {
  const prev = townState;
  try {
    const r = await fetch(API + '/api/state');
    townState = await r.json();
  } catch(e) {
    // Keep current state if fetch fails
    console.warn('fetchState failed, using cached state:', e.message);
    return;
  }

  // Detect new completed tasks → toast
  const prevDone = (prev.quests||[]).filter(q=>q.status==='done').length;
  const nowDone = (townState.quests||[]).filter(q=>q.status==='done').length;
  if (nowDone > prevDone && prevDone > 0) {
    const latest = (townState.quests||[]).filter(q=>q.status==='done').slice(-1)[0];
    const ag = agents.find(a=>a.id===latest?.agent);
    if (latest && ag) {
      showToast(`${ag.emoji} ${ag.name}`, `交付了：${latest.title}`, '去评分', () => { openTownHallTab('history'); });
    }
  }

  // Detect new log entries → toast for agent actions
  const prevLog = (prev.log||[]).length;
  const nowLog = (townState.log||[]).length;
  if (nowLog > prevLog && prevLog > 0) {
    const newEntries = (townState.log||[]).slice(prevLog);
    for (const e of newEntries) {
      if (e.agent !== '系统' && e.text.includes('交付') || e.text.includes('完成')) {
        // silent - handled by task detection above
      }
    }
  }

  renderAll();
}
async function publishTask(title) {
  await fetch(API + '/api/publish', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({title, description: title})
  });
  await fetchState();
}
async function rateQuest(questId, rating, review) {
  await fetch(API + '/api/rate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({quest_id:questId, rating, review})
  });
  await fetchState();
}

// ============================================================
// Canvas Renderer
// ============================================================
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
const agentDefs = {
  designer:  { name:'阿画', emoji:'', color:'#d87a5f', homeRatio:{x:.18, y:.58} },
  writer:    { name:'小文', emoji:'', color:'#65a094', homeRatio:{x:.66, y:.42} },
  reviewer:  { name:'审哥', emoji:'', color:'#8b879b', homeRatio:{x:.55, y:.34} },
  engineer:  { name:'阿程', emoji:'', color:'#6f936d', homeRatio:{x:.74, y:.66} },
  pm:        { name:'芝士', emoji:'', color:'#d6a645', homeRatio:{x:.28, y:.43} },
  craftsman: { name:'小匠', emoji:'', color:'#8d6e63', homeRatio:{x:.48, y:.38} },
};

let agents = [
  { id:'designer',  ...agentDefs.designer,  x:180, y:395, target:null, task:null },
  { id:'writer',    ...agentDefs.writer,    x:650, y:286, target:null, task:null },
  { id:'reviewer',  ...agentDefs.reviewer,  x:540, y:231, target:null, task:null },
  { id:'engineer',  ...agentDefs.engineer,  x:730, y:449, target:null, task:null },
  { id:'pm',        ...agentDefs.pm,        x:280, y:292, target:null, task:null },
  { id:'craftsman', ...agentDefs.craftsman, x:470, y:258, target:null, task:null },
  { id:'mayor',     name:'北北', emoji:'', color:'#c4553b', x:220, y:231, target:null, task:null, role:'镇长·守护灵', homeRatio:{x:.22, y:.34} },
];
let activeTab = 'quests';
let lastLogCount = 0;
let lastDoneCount = 0;

// Notification
function showToast(agent, text, action, actionFn) {
  const container = document.getElementById('toasts');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<span class="toast-agent">${agent}</span> ${text}${action ? ` <span class="toast-action" onclick="(${actionFn.toString()})()">${action}</span>` : ''}`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(()=>toast.remove(), 300); }, 6000);
}

// Library
function openLibrary() {
  document.getElementById('library-modal').classList.add('show');
  renderLibrary();
}
function closeLibrary() { document.getElementById('library-modal').classList.remove('show'); }
function renderLibrary() {
  const assets = townState.assets || [];
  const grid = document.getElementById('asset-grid');
  grid.innerHTML = assets.slice(0, 20).map(a => `
    <div class="asset-card" onclick="window.open('${a.url}','_blank')">
      <div class="asset-type">${a.type}</div>
      <div class="asset-name">${a.file}</div>
      <div class="asset-meta">${a.time} · ${(a.size/1024).toFixed(0)}KB</div>
    </div>
  `).join('') || '<p style="opacity:0.4;text-align:center;padding:20px;grid-column:1/-1;">智库空空，等第一个产出...</p>';
}

let canvasW = 780;
let canvasH = 520;
let townTick = 0;
let activeAgentId = 'designer';
const buildingLayout = [
  { id:'studio', agent:'designer', name:'设计工坊', x:.18, y:.56, w:150, h:116, color:'#d87a5f', sign:'画', tab:'history' },
  { id:'writer_h', agent:'writer', name:'文案间', x:.64, y:.30, w:138, h:108, color:'#65a094', sign:'文', tab:'history' },
  { id:'townhall', agent:null, name:'市政厅', x:.43, y:.50, w:174, h:132, color:'#d6a645', sign:'厅', tab:'todo' },
  { id:'review', agent:'reviewer', name:'审核室', x:.52, y:.25, w:132, h:104, color:'#8b879b', sign:'审', tab:'history' },
  { id:'engineer', agent:'engineer', name:'工程屋', x:.72, y:.61, w:150, h:112, color:'#6f936d', sign:'程', tab:'history' },
  { id:'pm', agent:'pm', name:'产品屋', x:.25, y:.31, w:132, h:104, color:'#d0a860', sign:'芝', tab:'zouzhe' },
  { id:'craftsman', agent:'craftsman', name:'技能工坊', x:.45, y:.34, w:132, h:96, color:'#8d6e63', sign:'匠', tab:'scores' },
  { id:'tower', agent:'mayor', name:'北北灯塔', x:.12, y:.26, w:102, h:154, color:'#c4553b', sign:'北', tab:'zouzhe' },
  { id:'gallery', agent:null, name:'作品长廊', x:.43, y:.73, w:200, h:92, color:'#b88964', sign:'展', tab:'scores' }
];
function syncCanvasSize() {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const rect = canvas.getBoundingClientRect();

function isActiveStatus(status) {
  return status === 'pending' || status === 'processing';
}
function isDoneStatus(status) {
  return status === 'done' || status === 'failed' || status === 'backlog';
}
function isAutoGenerated(task) {
  return task && (task.auto_generated === 1 || task.auto_generated === true || task.auto_generated === '1');
}
function todayKey() {
  return new Date().toISOString().slice(5,10);
}
function taskForQuest(quest, taskMap) {
  return taskMap[quest.quest_id] || (quest.quest_id ? taskMap[quest.quest_id.replace('_designer','').replace('_writer','')] : null)
    || Object.values(taskMap).find(t => t.title === quest.title) || {};
}
function outputsForTask(task) {
  if (!task) return [];
  if (task.outputs) {
    try { const p = JSON.parse(task.outputs); if (Array.isArray(p) && p.length > 0) return p; } catch(e) {}
    if (typeof task.outputs === 'string' && task.outputs !== '[]' && task.outputs !== '') return [task.outputs];
    if (Array.isArray(task.outputs) && task.outputs.length > 0) return task.outputs;
  }
  return task.output ? [task.output] : [];
}
function derivedTownState() {
  const tasks = townState.tasks || [];
  const quests = townState.quests || [];
  const suggestions = townState.suggestions?.suggestions || [];
  const activeTasks = tasks.filter(t => isActiveStatus(t.status));
  const bountyTasks = activeTasks.filter(t => !isAutoGenerated(t));
  const exploreIdeas = tasks.filter(t => isAutoGenerated(t));
  const doneQuests = quests.filter(q => q.status === 'done');
  const unratedQuests = doneQuests.filter(q => !q.rating);
  const ratedQuests = doneQuests.filter(q => q.rating);
  const today = todayKey();
  const todayDone = doneQuests.filter(q => (q.completed || '').startsWith(today)).length;
  const pendingSuggestions = suggestions.filter(s => s.status === 'pending');
  let health = 100;
  if (activeTasks.length > 10) health -= 20;
  if (unratedQuests.length > 10) health -= 30;
  if (activeTasks.length > 20) health -= 20;
  if (unratedQuests.length > 20) health -= 20;
  health = Math.max(0, Math.min(100, health));
  return {tasks, quests, suggestions, activeTasks, bountyTasks, exploreIdeas, doneQuests, unratedQuests, ratedQuests, todayDone, pendingSuggestions, health};
}

// Unified output link renderer — single source of truth
function renderOutputLinks(fileList, assets) {
  if (!fileList || !fileList.length) return '';
  const links = [];
  for (const f of fileList) {
    if (!f || typeof f !== 'string') continue;
    // Extract filename from path
    const fname = f.replace(/\\/g, '/').split('/').pop();
    // Skip dirty/non-filename values
    if (!fname || fname.includes('僵尸') || fname.includes('无产出') || fname.includes('缺文件')) continue;
    // Try assets match first, then /outputs/ fallback
    const asset = assets.find(a => a.file === fname || a.file === f);
    const url = asset ? asset.url : ('/outputs/' + encodeURIComponent(fname));
    links.push('<a href="' + url + '" target=_blank style="color:var(--accent-teal);font-size:11px;text-decoration:underline;margin-right:10px">' + fname + '</a>');
  }
  return links.length ? '<div style=\"margin-top:6px\">' + links.join('') + '</div>' : '';
}

           <button class="rate-btn sel-good" onclick="event.stopPropagation();rateQuest('${q.quest_id}','good')">好评</button>
           <button class="rate-btn sel-ok" onclick="event.stopPropagation();rateQuest('${q.quest_id}','ok')">一般</button>
           <button class="rate-btn sel-poor" onclick="event.stopPropagation();rateQuest('${q.quest_id}','poor')">差评</button>
         </span>`;
    const task = taskForQuest(q, taskMap);
    const outLinks = renderOutputLinks(outputsForTask(task), assets);
    return `<div class="quest-item">
      <div class="q-status done"></div>
      <div class="q-info">
        <div class="q-title">${q.title}</div>
        <div class="q-agent">${ag ? ag.emoji+' '+ag.name : ''} ${ratingHtml}</div>
        <div class="q-meta">完成：${q.completed || task.completed || '-'} · 状态：${q.rating ? '已评分' : '待评分'}</div>
        ${outLinks}
      </div>
    </div>`;
  }).join('');
  const exceptionHtml = failedOrBacklog.map(t => `<div class="quest-item">
    <div class="q-status pending"></div><div class="q-info"><div class="q-title">${t.title}</div><div class="q-agent">${t.status} · 需要回溯处理</div></div>
  </div>`).join('');
  document.getElementById('tab-history').innerHTML = `
    <div class="lifecycle-note"><span class="stage-chip">交付 / 任务记录</span>事实账本：done/failed/backlog、产出链接、评分入口与评价记录。</div>
    ${doneHtml}${exceptionHtml || ''}${(!doneHtml && !exceptionHtml) ? '<p style="opacity:0.4;text-align:center;padding:20px;">暂无完成记录</p>' : ''}`;

  // 成长 / 智库：积分榜、评价沉淀、资产入口。保留“积分榜”文案以兼容现有验收。
  const maxScore = Math.max(1, ...Object.values(scores).map(s=>s.xp||0));
  const sorted = Object.entries(scores).sort((a,b)=>(b[1].xp||0)-(a[1].xp||0));
  const scoreboard = sorted.map(([id, s], i) => {
    const ag = agents.find(a=>a.id===id);
    const pct = ((s.xp||0)/maxScore*100).toFixed(0);
    return `<div class="score-row ${i===0?'rank-1':''}">
      <div class="score-rank ${i===0?'gold':''}">${i+1}</div>
      <div class="avatar" style="background:${ag?.color||'#666'}20;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;">${ag?.emoji||'?'}</div>
      <div class="score-name">${s.name||id}<div style="font-size:11px;opacity:.45;font-weight:400;">Lv.${s.level || 1} · 已沉淀评价 ${d.ratedQuests.filter(q=>q.agent===id).length}</div></div>
      <div class="score-pts">${s.xp||0}</div>
      <div class="score-bar-wrap" style="position:absolute;bottom:4px;left:60px;right:60px;"><div class="score-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  const assetHtml = assets.slice(-6).reverse().map(a => `<div class="asset-card" onclick="window.open('${a.url}','_blank')">
    <div class="asset-type">${a.type}</div><div class="asset-name">${a.file}</div><div class="asset-meta">${a.time} · ${(a.size/1024).toFixed(0)}KB</div>
  </div>`).join('');
  document.getElementById('tab-scores').innerHTML = `
    <div class="lifecycle-note"><span class="stage-chip">成长 / 智库</span>居民积分榜、skill/反馈沉淀、资产、方法与模板。</div>
    <h3>居民积分榜</h3>${scoreboard}
    <h3 style="margin-top:14px;">最新智库资产</h3><div class="asset-grid">${assetHtml || '<p style="opacity:0.4;text-align:center;padding:20px;grid-column:1/-1;">暂无资产</p>'}</div>`;

  // 奏折：正式治理建议 + 健康报告。
  const suggestions = d.suggestions.slice();
  const healthReport = `<div class="quest-item"><div class="q-status ${d.health < 70 ? 'processing':'done'}"></div><div class="q-info">
    <div class="q-title">小镇健康报告：${d.health} 分</div>
    <div class="q-agent">待处理 ${d.activeTasks.length} · 未评分 ${d.unratedQuests.length} · 待批奏折 ${d.pendingSuggestions.length}</div>
  </div></div>`;
  document.getElementById('tab-zouzhe').innerHTML = healthReport + (suggestions.reverse().map(s => {
    const st = s.status === 'pending' ? '⏳ 待批' : s.status === 'approved' ? '✅ 已批准' : '❌ 驳回';
    const review = s.review ? `<div style="font-size:11px;opacity:0.5;margin-top:4px;">批示：「${s.review}」</div>` : '';
    const btns = s.status === 'pending'
      ? `<div class="rate-btns" style="margin-top:6px">
           <button class="rate-btn sel-excellent" onclick="event.stopPropagation();approveSugg('${s.id}','approved')">批准</button>
           <button class="rate-btn sel-poor" onclick="event.stopPropagation();approveSugg('${s.id}','rejected')">驳回</button>
         </div>`
      : '';
    return `<div class="quest-item">
      <div class="q-status ${s.status==='pending'?'processing':'done'}"></div>
      <div class="q-info"><div class="q-title">${s.period || '奏折'} · ${s.title}</div>
        <div style="font-size:12px;opacity:0.5;">${s.description || s.desc || '(无描述)'} &nbsp; ${st} &nbsp; ${s.created_at || ''}</div>${review}${btns}</div>
    </div>`;
  }).join('') || '<p style="opacity:0.4;text-align:center;padding:20px;">暂无奏折。守护灵将在早8/午12/晚6呈报。</p>');

  // 探索：居民或系统自发发现的机会池。auto_generated 在此作为现有字段映射，不与悬赏板/任务记录重复。
  document.getElementById('tab-explore').innerHTML = `
    <div class="lifecycle-note"><span class="stage-chip">探索</span>居民或系统自发发现的机会池；采纳后才进入悬赏板，未采纳不进任务记录。</div>
    ${d.exploreIdeas.slice().reverse().map(t => {
      const ag = agents.find(a=>a.id===t.assignee);
      return `<div class="quest-item">
        <div class="q-status ${t.status}"></div>
        <div class="q-info">
          <div class="q-title">✨ ${t.title}</div>
          <div class="q-agent">${ag ? ag.emoji+' '+ag.name : '系统'} · 自主发现 · ${t.status}</div>
          ${t.body ? `<div class="q-meta">${t.body}</div>` : ''}
          <button class="reminder-action" onclick="publishTask('${String(t.title).replace(/'/g, "\\'")}')">采纳为悬赏</button>
        </div>
      </div>`;
    }).join('') || '<p style="opacity:0.4;text-align:center;padding:20px;">暂无未采纳探索。居民有新灵感时会先停留在这里。</p>'}`;
}

// ============================================================
// Interaction
// ============================================================
function openTownHall() {
  document.getElementById('townhall-modal').classList.add('show');
  switchTab('todo');
}
function openTownHallTab(tab) {
  document.getElementById('townhall-modal').classList.add('show');
  switchTab(tab);
}
function openGallery() {
  window.open('/gallery.html', '_blank');
}
function closeModal() {
  document.getElementById('townhall-modal').classList.remove('show');
}
function switchTab(tab) {
  activeTab = tab;
  const tabNames = {todo:'待办',quests:'悬赏板',history:'交付 / 任务记录',zouzhe:'奏折',explore:'探索',scores:'成长 / 智库'};
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.includes(tabNames[tab])));
  document.getElementById('tab-todo').style.display = tab === 'todo' ? '' : 'none';
  document.getElementById('tab-quests').style.display = tab === 'quests' ? '' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? '' : 'none';
  document.getElementById('tab-zouzhe').style.display = tab === 'zouzhe' ? '' : 'none';
  document.getElementById('tab-explore').style.display = tab === 'explore' ? '' : 'none';
  document.getElementById('tab-scores').style.display = tab === 'scores' ? '' : 'none';
}
async function publish() {
  const inp = document.getElementById('pub-input');
  const title = inp.value.trim();
  if (!title) return;
  await publishTask(title);
  inp.value = '';
}
async function approveSugg(id, action) {
  await fetch(API + '/api/approve', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id, action, review: action==='approved'?'批准':'驳回'})
  });
  await fetchState();
}
async function rateQuest(questId, rating) {
  const labels = {excellent:'卓越', good:'好评', ok:'一般', poor:'差评'};
  const review = prompt('给' + labels[rating] + '写一句评价吧~', '');
  if (review === null) return; // 用户取消
  await fetch(API + '/api/rate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({quest_id: questId, rating, review})
  });
  await fetchState();
}
function clickAgent(id) {
  const a = agents.find(x=>x.id===id);
  if (a) {
    const tasks = townState.tasks||[];
    const t = tasks.find(x=>x.assignee===id && x.status==='processing');
    alert(`${a.emoji} ${a.name}\n积分：${(townState.agents[id]||{xp:0}).xp}\n${t ? '正在：'+t.title : '待命中'}`);
  }
}

function eventPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return {x:e.clientX-rect.left, y:e.clientY-rect.top};
}
function hitBuilding(mx, my) {
  return buildingLayout.find(b => {
    const x=canvasW*b.x, y=canvasH*b.y;
    return mx >= x-4 && mx <= x+b.w+4 && my >= y-6 && my <= y+b.h+24;
  });
}
function openBuilding(b) {
  if (b.id === 'townhall') openTownHall();
  else if (b.id === 'gallery') openGallery();
  else if (b.id === 'craftsman') openTownHallTab('scores');
  else if (b.id === 'tower' || b.id === 'pm') openTownHallTab('zouzhe');
  else if (b.agent) clickAgent(b.agent);
}
canvas.addEventListener('click', e => {
  const {x:mx, y:my} = eventPoint(e);
  const b = hitBuilding(mx, my);
  if (b) { openBuilding(b); return; }
  for (const a of agents) {
    if (Math.abs(mx-a.x) < 18 && Math.abs(my-a.y) < 28) { clickAgent(a.id); return; }
  }
});

canvas.addEventListener('mousemove', e => {
  const {x:mx, y:my} = eventPoint(e);
  let cursor = hitBuilding(mx, my) ? 'pointer' : 'default';
  for (const a of agents) if (Math.abs(mx-a.x) < 18 && Math.abs(my-a.y) < 28) cursor = 'pointer';
  canvas.style.cursor = cursor;
});

// ============================================================
// Game loop
// ============================================================
function update() {
  syncCanvasSize();
  for (const a of agents) {
    if (!a.target && a.homeRatio) a.target = {x:canvasW*a.homeRatio.x, y:canvasH*a.homeRatio.y};
    if (!a.task && Math.random() < 0.003) {
      a.x += (Math.random()-0.5)*4; a.y += (Math.random()-0.5)*4;
      a.x = Math.max(18, Math.min(canvasW-18, a.x)); a.y = Math.max(120, Math.min(canvasH-36, a.y));
    }
    if (a.target) {
      const dx = a.target.x-a.x, dy = a.target.y-a.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d > 1.2) { a.x += dx*0.025; a.y += dy*0.025; }
    }
  }
  const tasks = townState.tasks || [];
  for (const a of agents) {
    const t = tasks.find(x=>x.assignee===a.id && x.status==='processing');
    a.task = t ? t.title : null;
  }
}

function gameLoop() {
  update();
  renderMap();
  requestAnimationFrame(gameLoop);
}

// Boot
if (window.__INIT_STATE__) renderAll();
fetchState();
gameLoop();
setInterval(fetchState, 8000); // Poll every 8s
</script>
