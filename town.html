<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>久久小镇</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
:root {
  --bg: #0f0f1a;
  --panel: #16213e;
  --amber: #e2b04a;
  --text: #c8d0e0;
  --muted: #6c6c8a;
  --accent-red: #e8715c;
  --accent-teal: #4ecdc4;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #faf7f2; font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  display:flex; justify-content:center; align-items:flex-start; min-height:100vh;
  color: var(--text); padding:24px 0;
}
.game {
  width: 1120px; display:flex; flex-direction:column; gap:10px;
}
.topbar {
  display:flex; justify-content:space-between; align-items:center;
  padding: 18px 22px; background:#1a1a1a; border-radius:8px;
  border: 1px solid rgba(26,26,26,0.08);
}
.topbar h1 { font-size:24px; color:#faf7f2; letter-spacing:3px; }
.topbar .stats { display:flex; gap:18px; font-size:13px; }
.topbar .stats span { opacity:0.72; }
.topbar .stats b { color:#faf7f2; }
.top-actions { display:flex; align-items:center; gap:10px; }
.ghost-btn {
  background:transparent; border:1px solid rgba(250,247,242,0.24); color:#faf7f2;
  border-radius:6px; padding:8px 12px; font-size:12px; cursor:pointer;
}
.ghost-btn:hover { border-color:#faf7f2; }
.mayor-dashboard {
  display:grid; grid-template-columns: 1.2fr repeat(4, 1fr); gap:10px;
}
.guardian-card, .dash-card {
  background:#fffdfa; border:1px solid rgba(26,26,26,0.10); border-radius:8px;
  padding:16px; color:#1a1a1a; box-shadow:0 10px 28px rgba(26,26,26,0.06);
}
.guardian-card { display:flex; flex-direction:column; justify-content:space-between; min-height:116px; }
.guardian-kicker, .dash-label { font-size:11px; letter-spacing:2px; color:#8a7d70; }
.guardian-advice { font-size:17px; line-height:1.55; margin-top:10px; font-weight:650; }
.dash-card { text-align:left; cursor:pointer; transition:transform .16s, border-color .16s; }
.dash-card:hover { transform:translateY(-2px); border-color:#c4553b; }
.dash-value { font-size:34px; line-height:1; font-weight:850; margin:18px 0 8px; color:#1a1a1a; }
.dash-hint { font-size:12px; color:#6f665f; line-height:1.4; }
.dash-card.accent .dash-value { color:#c4553b; }
.main-row { display:flex; gap:8px; }
.map-wrap {
  flex:1; background:var(--panel); border-radius:var(--radius); overflow:hidden;
  border: 1px solid rgba(255,255,255,0.05); position:relative;
}
canvas { display:block; width:100%; height:520px; }
.sidebar {
  width: 280px; display:flex; flex-direction:column; gap:8px;
}
.panel {
  background:var(--panel); border-radius:var(--radius); padding:14px;
  border: 1px solid rgba(255,255,255,0.05);
}
.panel h3 { font-size:12px; letter-spacing:3px; color:var(--amber); margin-bottom:10px; text-transform:uppercase; }
.agent-mini {
  display:flex; align-items:center; gap:8px; padding:8px; border-radius:8px; margin-bottom:4px;
}
.agent-mini:hover { background:rgba(255,255,255,0.03); }
.agent-mini .avatar {
  width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px;
}
.agent-mini .info { flex:1; min-width:0; }
.agent-mini .name { font-size:13px; font-weight:600; }
.agent-mini .status { font-size:11px; opacity:0.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.agent-mini .score { font-size:18px; font-weight:800; color:var(--amber); }
.log-feed { font-size:12px; line-height:1.8; max-height:160px; overflow-y:auto; }
.log-feed .entry { opacity:0.6; }
.log-feed .time { color:var(--amber); margin-right:8px; font-size:11px; }



/* Mayor cockpit / first-screen product layer */
.topbar h1 { display:flex; flex-direction:column; gap:2px; }
.topbar h1 small { font-size:11px; color:var(--muted); letter-spacing:1px; font-weight:400; }
.cockpit {
  display:grid; grid-template-columns:1.2fr 1.6fr 1.1fr; gap:8px;
}
.cockpit-card {
  background:linear-gradient(145deg, rgba(226,176,74,0.10), rgba(22,33,62,0.96));
  border:1px solid rgba(226,176,74,0.18); border-radius:var(--radius); padding:14px;
  min-height:104px; position:relative; overflow:hidden;
}
.cockpit-card::after {
  content:""; position:absolute; inset:auto -30px -45px auto; width:120px; height:120px;
  background:radial-gradient(circle, rgba(226,176,74,0.12), transparent 65%);
}
.cockpit-eyebrow { font-size:11px; letter-spacing:2px; color:var(--amber); opacity:0.9; }
.cockpit-title { font-size:18px; font-weight:800; margin-top:6px; color:#fff; }
.cockpit-story { font-size:12px; color:var(--muted); line-height:1.6; margin-top:6px; }
.cockpit-metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.metric-card {
  background:rgba(255,255,255,0.035); border:1px solid rgba(255,255,255,0.06);
  border-radius:10px; padding:10px; min-height:76px;
}
.metric-card b { display:block; font-size:24px; color:var(--amber); line-height:1; margin-bottom:8px; }
.metric-card span { font-size:11px; color:var(--muted); }
.loop-progress-wrap { height:7px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; margin-top:12px; }
.loop-progress { height:100%; width:0%; background:linear-gradient(90deg, var(--accent-teal), var(--amber)); transition:width .45s ease; }
.loop-copy { display:flex; justify-content:space-between; gap:10px; font-size:11px; color:var(--muted); margin-top:8px; }
.map-head {
  position:absolute; left:14px; right:14px; top:12px; z-index:3; display:flex; justify-content:space-between; align-items:flex-start;
  pointer-events:none;
}
.map-head h3 { font-size:13px; letter-spacing:3px; color:#fff; margin-bottom:4px; }
.map-head p { font-size:11px; color:var(--muted); }
.map-head button, .reminder-action {
  pointer-events:auto; border:1px solid rgba(226,176,74,0.45); background:rgba(226,176,74,0.12);
  color:var(--amber); border-radius:999px; padding:7px 12px; font-size:12px; cursor:pointer;
}
.map-legend {
  position:absolute; left:14px; bottom:12px; z-index:3; display:flex; gap:8px; flex-wrap:wrap;
}
.legend-pill {
  background:rgba(10,10,20,0.78); border:1px solid rgba(255,255,255,0.08);
  border-radius:999px; padding:6px 10px; font-size:11px; color:var(--text);
}
.reminder-list { display:flex; flex-direction:column; gap:8px; }
.reminder-item {
  border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03);
  border-radius:10px; padding:10px;
}
.reminder-item.urgent { border-color:rgba(232,113,92,0.35); background:rgba(232,113,92,0.06); }
.reminder-item.done { border-color:rgba(78,205,196,0.28); background:rgba(78,205,196,0.05); }
.reminder-title { font-size:13px; font-weight:700; }
.reminder-meta { font-size:11px; color:var(--muted); line-height:1.5; margin-top:4px; }
.reminder-action { margin-top:8px; padding:5px 10px; font-size:11px; }
@media (max-width: 1080px) {
  .game { width:96vw; }
  .cockpit { grid-template-columns:1fr; }
  .main-row { flex-direction:column; }
  .sidebar { width:100%; display:grid; grid-template-columns:1fr 1fr 1fr; }
}

/* Modal overlay */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100;
  display:none; justify-content:center; align-items:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--panel); border-radius:var(--radius); border:1px solid var(--amber);
  width:700px; max-height:80vh; overflow-y:auto; padding:28px;
  min-height: 400px;
}
.modal h2 { color:var(--amber); font-size:20px; letter-spacing:2px; margin-bottom:20px; text-align:center; }
.modal .close {
  position:absolute; top:16px; right:20px; background:none; border:none;
  color:var(--text); font-size:24px; cursor:pointer;
}

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:16px; }
.tab {
  flex:1; padding:10px; text-align:center; border-radius:8px; cursor:pointer;
  font-size:13px; letter-spacing:1px; background:rgba(255,255,255,0.03); border:1px solid transparent;
  color:var(--muted); transition:all 0.2s;
}
.tab:hover { background:rgba(255,255,255,0.06); }
.tab.active { background:rgba(226,176,74,0.1); border-color:var(--amber); color:var(--amber); }

/* Quest board */
.quest-item {
  padding:12px; border-radius:8px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start;
  border:1px solid rgba(255,255,255,0.06);
}
.quest-item .q-status {
  width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0;
}
.quest-item .q-status.pending { background:var(--muted); }
.quest-item .q-status.processing { background:var(--accent-teal); animation:pulse 1.5s infinite; }
.quest-item .q-status.done { background:#4a9; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.quest-item .q-info { flex:1; }
.quest-item .q-title { font-size:14px; font-weight:600; }
.quest-item .q-agent { font-size:11px; opacity:0.5; }
.quest-item .q-meta { font-size:11px; margin-top:4px; display:flex; gap:12px; }
.quest-item .q-rating { font-size:13px; }
.quest-item .q-rating.excellent { color:#ffd700; }
.quest-item .q-rating.good { color:#4ecdc4; }
.quest-item .q-rating.ok { color:var(--muted); }
.quest-item .q-rating.poor { color:var(--accent-red); }

/* Scoreboard */
.score-row {
  display:flex; align-items:center; gap:10px; padding:12px; border-radius:8px;
  margin-bottom:6px; border:1px solid rgba(255,255,255,0.05); position:relative;
}
.score-row.rank-1 { border-color:var(--amber); background:rgba(226,176,74,0.05); }
.score-rank { font-size:24px; font-weight:900; width:36px; text-align:center; color:var(--muted); }
.score-rank.gold { color:var(--amber); }
.score-name { flex:1; font-weight:600; }
.score-pts { font-size:24px; font-weight:800; color:var(--amber); }
.score-bar-wrap { height:4px; background:rgba(255,255,255,0.05); border-radius:2px; margin-top:4px; }
.score-bar { height:100%; background:var(--amber); border-radius:2px; transition:width 0.5s; }

/* Publish form */
.pub-form { display:flex; gap:8px; margin-top:8px; }
.pub-form input {
  flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; padding:10px 14px; color:var(--text); font-size:14px; outline:none;
}
.pub-form input:focus { border-color:var(--amber); }
.pub-form button {
  background:var(--amber); color:#0a0a14; border:none; border-radius:8px;
  padding:10px 20px; font-weight:700; cursor:pointer; font-size:14px;
}
.pub-form button:hover { opacity:0.9; }

/* Building tooltip */
.building-tip {
  position:absolute; display:none; background:var(--panel); border:1px solid var(--amber);
  border-radius:8px; padding:8px 14px; font-size:13px; pointer-events:none; z-index:50;
}

/* Rating buttons */
.rate-btns { display:flex; gap:6px; margin-top:8px; }
.rate-btn {
  padding:4px 12px; border-radius:6px; border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03); color:var(--text); cursor:pointer; font-size:12px;
  transition:all 0.2s;
}
.rate-btn:hover { border-color:var(--amber); }
.rate-btn.sel-excellent { background:rgba(255,215,0,0.15); border-color:#ffd700; color:#ffd700; }
.rate-btn.sel-good { background:rgba(78,205,196,0.15); border-color:#4ecdc4; color:#4ecdc4; }
.rate-btn.sel-poor { background:rgba(232,113,92,0.15); border-color:#e8715c; color:#e8715c; }

/* Notification toast */
.toast-container {
  position:fixed; top:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px;
}
.toast {
  background:var(--panel); border:1px solid var(--amber); border-radius:10px;
  padding:14px 18px; font-size:13px; animation:slideIn 0.3s ease; max-width:320px;
}
.toast .toast-agent { color:var(--amber); font-weight:600; }
.toast .toast-action { font-size:11px; opacity:0.5; margin-top:4px; cursor:pointer; color:var(--accent-teal); text-decoration:underline; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* Asset cards */
.asset-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.asset-card {
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
  border-radius:8px; padding:12px; cursor:pointer; transition:all 0.2s;
}
.asset-card:hover { border-color:var(--accent-teal); background:rgba(78,205,196,0.05); }
.asset-card .asset-type {
  font-size:10px; letter-spacing:2px; color:var(--accent-teal); margin-bottom:4px;
}
.asset-card .asset-name { font-size:13px; font-weight:600; margin-bottom:4px; }
.asset-card .asset-meta { font-size:11px; opacity:0.4; }

/* Notification badge */
.badge {
  display:inline-block; background:var(--accent-red); color:#fff; border-radius:10px;
  padding:1px 7px; font-size:10px; font-weight:700; animation:pulse 2s infinite;
}

.lifecycle-note { font-size:11px; color:var(--muted); line-height:1.6; margin-bottom:10px; }
.stage-chip { display:inline-block; border:1px solid rgba(255,255,255,0.10); border-radius:999px; padding:2px 8px; margin-right:6px; font-size:10px; color:var(--muted); }
.todo-empty { opacity:0.45; text-align:center; padding:22px; }

</style>
</head>
<body>

<div class="game">
  <!-- Top bar -->
  <div class="topbar">
    <h1>久久小镇</h1>
    <div class="top-actions">
      <div class="stats">
        <span>悬赏 <b id="stat-tasks">0</b></span>
        <span>完成 <b id="stat-done">0</b></span>
        <span>今日 <b id="stat-day">0</b></span>
      </div>
      <button class="ghost-btn" onclick="openGallery()">作品长廊</button>
    </div>
  </div>

  <!-- Mayor dashboard -->
  <div class="mayor-dashboard" id="mayor-dashboard">
    <section class="guardian-card">
      <div class="guardian-kicker">北北守护灵</div>
      <div class="guardian-advice" id="guardian-advice">正在观察小镇...</div>
    </section>
    <button class="dash-card accent" onclick="openTownHallTab('quests')">
      <div class="dash-label">待处理</div>
      <div class="dash-value" id="stat-pending">0</div>
      <div class="dash-hint">悬赏与执行队列</div>
    </button>
    <button class="dash-card accent" onclick="openTownHallTab('history')">
      <div class="dash-label">未评分</div>
      <div class="dash-value" id="stat-unrated">0</div>
      <div class="dash-hint">评价会沉淀为成长</div>
    </button>
    <button class="dash-card" onclick="openTownHallTab('history')">
      <div class="dash-label">今日交付</div>
      <div class="dash-value" id="stat-today-done">0</div>
      <div class="dash-hint">今天完成的作品</div>
    </button>
    <button class="dash-card" onclick="openTownHallTab('zouzhe')">
      <div class="dash-label">健康度</div>
      <div class="dash-value" id="stat-health">100</div>
      <div class="dash-hint">待办与反馈压力</div>
    </button>
  </div>

  <!-- Main -->
  <div class="main-row">
    <!-- Map -->
    <div class="map-wrap" id="map-wrap">
      <div class="map-head">
        <div>
          <h3>居民生活地图</h3>
          <p id="map-subtitle">看见每位居民的位置、工作状态与产出流向</p>
        </div>
        <button onclick="openTownHall()">进入市政厅</button>
      </div>
      <canvas id="map" width="780" height="520"></canvas>
      <div class="map-legend" id="map-legend"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="panel">
        <h3>闭环提醒</h3>
        <div class="reminder-list" id="reminder-list"></div>
      </div>
      <div class="panel">
        <h3>小镇居民</h3>
        <div id="agent-list"></div>
      </div>
      <div class="panel" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
        <h3>小镇日报</h3>
        <div class="log-feed" id="log-feed"></div>
      </div>
    </div>
  </div>
</div>

<!-- Town Hall Modal -->
<div class="modal-overlay" id="townhall-modal">
  <div class="modal" style="position:relative;">
    <button class="close" onclick="closeModal()" style="position:absolute;">✕</button>
    <h2>🏛️ 市政厅</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('todo')">待办</div>
      <div class="tab" onclick="switchTab('quests')">悬赏板</div>
      <div class="tab" onclick="switchTab('history')">交付 / 任务记录</div>
      <div class="tab" onclick="switchTab('zouzhe')">奏折</div>
      <div class="tab" onclick="switchTab('explore')">探索</div>
      <div class="tab" onclick="switchTab('scores')">成长 / 智库</div>
    </div>
    <div id="tab-todo"></div>
    <div id="tab-quests" style="display:none;">
      <div class="pub-form">
        <input id="pub-input" placeholder="发布新悬赏，如：设计一张海报..." onkeydown="if(event.key==='Enter')publish()">
        <button onclick="publish()">发布</button>
      </div>
      <div id="active-quests" style="margin-top:14px;"></div>
    </div>
    <div id="tab-history" style="display:none;"></div>
    <div id="tab-zouzhe" style="display:none;"></div>
    <div id="tab-explore" style="display:none;"></div>
    <div id="tab-scores" style="display:none;"></div>
  </div>
</div>

<!-- Library Modal -->
<div class="modal-overlay" id="library-modal">
  <div class="modal" style="position:relative;">
    <button class="close" onclick="closeLibrary()" style="position:absolute;">✕</button>
    <h2>📚 智库 · 小镇资产</h2>
    <p style="font-size:12px;opacity:0.4;text-align:center;margin-bottom:16px;">所有产出自动沉淀，无需去D盘翻找</p>
    <div class="asset-grid" id="asset-grid"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
// ============================================================
// Town Data
// ============================================================
const API = 'http://localhost:8700';
let townState = window.__INIT_STATE__ || { tasks: [], agents: {}, quests: [], log: [], scoring_rules: {} };

async function fetchState() {
  const prev = townState;
  try {
    const r = await fetch(API + '/api/state');
    townState = await r.json();
  } catch(e) {
    // Keep current state if fetch fails
    console.warn('fetchState failed, using cached state:', e.message);
    return;
  }

  // Detect new completed tasks → toast
  const prevDone = (prev.quests||[]).filter(q=>q.status==='done').length;
  const nowDone = (townState.quests||[]).filter(q=>q.status==='done').length;
  if (nowDone > prevDone && prevDone > 0) {
    const latest = (townState.quests||[]).filter(q=>q.status==='done').slice(-1)[0];
    const ag = agents.find(a=>a.id===latest?.agent);
    if (latest && ag) {
      showToast(`${ag.emoji} ${ag.name}`, `交付了：${latest.title}`, '去评分', () => { openTownHallTab('history'); });
    }
  }

  // Detect new log entries → toast for agent actions
  const prevLog = (prev.log||[]).length;
  const nowLog = (townState.log||[]).length;
  if (nowLog > prevLog && prevLog > 0) {
    const newEntries = (townState.log||[]).slice(prevLog);
    for (const e of newEntries) {
      if (e.agent !== '系统' && e.text.includes('交付') || e.text.includes('完成')) {
        // silent - handled by task detection above
      }
    }
  }

  renderAll();
}
async function publishTask(title) {
  await fetch(API + '/api/publish', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({title, description: title})
  });
  await fetchState();
}
async function rateQuest(questId, rating, review) {
  await fetch(API + '/api/rate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({quest_id:questId, rating, review})
  });
  await fetchState();
}

// ============================================================
// Canvas Renderer
// ============================================================
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
const buildings = [
  { id:'townhall', name:'市政厅', x:320, y:350, w:140, h:110, color:'rgba(226,176,74,0.08)', border:'#e2b04a' },
  { id:'studio',   name:'设计工坊', x:30,  y:100, w:150, h:120, color:'rgba(232,113,92,0.08)', border:'#e8715c' },

function drawGround() {
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(0,0,780,520);
  ctx.strokeStyle = 'rgba(255,255,255,0.015)'; ctx.lineWidth = 1;
  for (let x=0; x<780; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,520); ctx.stroke(); }
  for (let y=0; y<520; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(780,y); ctx.stroke(); }
  // paths
  ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 28;
  ctx.beginPath(); ctx.moveTo(105,220); ctx.lineTo(395,220); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(395,180); ctx.lineTo(395,390); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(655,220); ctx.lineTo(395,390); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(105,390); ctx.lineTo(395,390); ctx.stroke();
  // trees
  const trees = [[250,300],[450,440],[710,250],[80,440],[700,450],[180,440]];
  for (const [tx,ty] of trees) {
    ctx.fillStyle = '#1a3a18'; ctx.beginPath(); ctx.arc(tx,ty-8,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2d5a27'; ctx.beginPath(); ctx.arc(tx-5,ty-3,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2d5a27'; ctx.beginPath(); ctx.arc(tx+5,ty-3,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5a3a1a'; ctx.fillRect(tx-2,ty+4,4,8);
  }
}

function drawBuilding(b) {
  const {x,y,w,h} = b;
  ctx.fillStyle = b.color; ctx.fillRect(x+8, y+18, w-16, h-28);
  ctx.strokeStyle = b.border; ctx.lineWidth = 1.5; ctx.strokeRect(x+8, y+18, w-16, h-28);
  // roof
  ctx.fillStyle = b.border + '20';
  ctx.beginPath(); ctx.moveTo(x+4,y+18); ctx.lineTo(x+w/2,y-2); ctx.lineTo(x+w-4,y+18); ctx.closePath();
  ctx.fill(); ctx.strokeStyle = b.border; ctx.lineWidth = 1; ctx.stroke();
  // windows
  ctx.fillStyle = b.border + '40';
  for (let wy=y+26; wy<y+h-14; wy+=22)
    for (let wx=x+16; wx<x+w-16; wx+=16)
      ctx.fillRect(wx,wy,7,7);
  // label
  ctx.fillStyle = '#ffffff70'; ctx.font = '10px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center'; ctx.fillText(b.name, x+w/2, y+h-4);
  // highlight for townhall
  if (b.id === 'townhall') {
    ctx.strokeStyle = b.border; ctx.lineWidth = 2;
    ctx.setLineDash([4,4]); ctx.strokeRect(x-2, y-4, w+4, h+6); ctx.setLineDash([]);
  }
}

function drawAgent(a) {
  ctx.save();
  // Mayor glow
  if (a.id === 'mayor') {
    ctx.shadowColor = '#e2b04a';
    ctx.shadowBlur = 12 + Math.sin(Date.now()/1000) * 4;
  }
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath();
  ctx.ellipse(a.x, a.y+14, 9, 3.5, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle = a.color; ctx.fillRect(a.x-7, a.y-3, 14, 14);
  // head
  ctx.fillRect(a.x-5, a.y-11, 10, 9);
  // eyes
  ctx.fillStyle = '#fff'; ctx.fillRect(a.x-3, a.y-9, 2.5, 2.5); ctx.fillRect(a.x+1, a.y-9, 2.5, 2.5);
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(a.x-2, a.y-8, 1.5, 1.5); ctx.fillRect(a.x+2, a.y-8, 1.5, 1.5);
  // working indicator
  if (a.task) {
    ctx.fillStyle = '#4ecdc4'; ctx.beginPath(); ctx.arc(a.x+9, a.y-12, 3.5, 0, Math.PI*2); ctx.fill();
    // speech bubble
    const txt = a.task.length > 10 ? a.task.slice(0,10)+'…' : a.task;
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; roundRect(ctx, a.x-50, a.y-32, 100, 18, 5);
    ctx.fillStyle = '#fff'; ctx.font = '9px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center'; ctx.fillText(txt, a.x, a.y-19);
  }
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
}

function renderMap() {

function isActiveStatus(status) {
  return status === 'pending' || status === 'processing';
}
function isDoneStatus(status) {
  return status === 'done' || status === 'failed' || status === 'backlog';
}
function isAutoGenerated(task) {
  return task && (task.auto_generated === 1 || task.auto_generated === true || task.auto_generated === '1');
}
function todayKey() {
  return new Date().toISOString().slice(5,10);
}
function taskForQuest(quest, taskMap) {
  return taskMap[quest.quest_id] || (quest.quest_id ? taskMap[quest.quest_id.replace('_designer','').replace('_writer','')] : null)
    || Object.values(taskMap).find(t => t.title === quest.title) || {};
}
function outputsForTask(task) {
  if (!task) return [];
  if (task.outputs) {
    try { const p = JSON.parse(task.outputs); if (Array.isArray(p) && p.length > 0) return p; } catch(e) {}
    if (typeof task.outputs === 'string' && task.outputs !== '[]' && task.outputs !== '') return [task.outputs];
    if (Array.isArray(task.outputs) && task.outputs.length > 0) return task.outputs;
  }
  return task.output ? [task.output] : [];
}
function derivedTownState() {
  const tasks = townState.tasks || [];
  const quests = townState.quests || [];
  const suggestions = townState.suggestions?.suggestions || [];
  const activeTasks = tasks.filter(t => isActiveStatus(t.status));
  const bountyTasks = activeTasks.filter(t => !isAutoGenerated(t));
  const exploreIdeas = tasks.filter(t => isAutoGenerated(t) && !isDoneStatus(t.status));
  const doneQuests = quests.filter(q => q.status === 'done');
  const unratedQuests = doneQuests.filter(q => !q.rating);
  const ratedQuests = doneQuests.filter(q => q.rating);
  const today = todayKey();
  const todayDone = doneQuests.filter(q => (q.completed || '').startsWith(today)).length;
  const pendingSuggestions = suggestions.filter(s => s.status === 'pending');
  let health = 100;
  if (activeTasks.length > 10) health -= 20;
  if (unratedQuests.length > 10) health -= 30;
  if (activeTasks.length > 20) health -= 20;
  if (unratedQuests.length > 20) health -= 20;
  health = Math.max(0, Math.min(100, health));
  return {tasks, quests, suggestions, activeTasks, bountyTasks, exploreIdeas, doneQuests, unratedQuests, ratedQuests, todayDone, pendingSuggestions, health};
}

// Unified output link renderer — single source of truth
function renderOutputLinks(fileList, assets) {
  if (!fileList || !fileList.length) return '';
  const links = [];
  for (const f of fileList) {
    if (!f || typeof f !== 'string') continue;
    // Extract filename from path
    const fname = f.replace(/\\/g, '/').split('/').pop();
    // Skip dirty/non-filename values
    if (!fname || fname.includes('僵尸') || fname.includes('无产出') || fname.includes('缺文件')) continue;
    // Try assets match first, then /outputs/ fallback
    const asset = assets.find(a => a.file === fname || a.file === f);
    const url = asset ? asset.url : ('/outputs/' + encodeURIComponent(fname));
    links.push('<a href="' + url + '" target=_blank style="color:var(--accent-teal);font-size:11px;text-decoration:underline;margin-right:10px">' + fname + '</a>');
  }
  return links.length ? '<div style=\"margin-top:6px\">' + links.join('') + '</div>' : '';
}

  // 交付 / 任务记录：已进入任务生命周期的事实账本，未评分首要动作是评分。
  const failedOrBacklog = tasks.filter(t => t.status === 'failed' || t.status === 'backlog');

    const ag = agents.find(a=>a.id===q.agent);

  const exceptionHtml = failedOrBacklog.map(t => `<div class="quest-item">

    <div class="lifecycle-note"><span class="stage-chip">交付 / 任务记录</span>事实账本：done/failed/backlog、产出链接、评分入口与评价记录。</div>
    ${doneHtml}${exceptionHtml || ''}${(!doneHtml && !exceptionHtml) ? '<p style="opacity:0.4;text-align:center;padding:20px;">暂无完成记录</p>' : ''}`;

  // 成长 / 智库：积分榜、评价沉淀、资产入口。保留“积分榜”文案以兼容现有验收。
  const maxScore = Math.max(1, ...Object.values(scores).map(s=>s.xp||0));
  const sorted = Object.entries(scores).sort((a,b)=>(b[1].xp||0)-(a[1].xp||0));
  const scoreboard = sorted.map(([id, s], i) => {
    const ag = agents.find(a=>a.id===id);
    const pct = ((s.xp||0)/maxScore*100).toFixed(0);
    return `<div class="score-row ${i===0?'rank-1':''}">
      <div class="score-rank ${i===0?'gold':''}">${i+1}</div>
      <div class="avatar" style="background:${ag?.color||'#666'}20;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;">${ag?.emoji||'?'}</div>
      <div class="score-name">${s.name||id}<div style="font-size:11px;opacity:.45;font-weight:400;">Lv.${s.level || 1} · 已沉淀评价 ${d.ratedQuests.filter(q=>q.agent===id).length}</div></div>
      <div class="score-pts">${s.xp||0}</div>
      <div class="score-bar-wrap" style="position:absolute;bottom:4px;left:60px;right:60px;"><div class="score-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  const assetHtml = assets.slice(-6).reverse().map(a => `<div class="asset-card" onclick="window.open('${a.url}','_blank')">
    <div class="asset-type">${a.type}</div><div class="asset-name">${a.file}</div><div class="asset-meta">${a.time} · ${(a.size/1024).toFixed(0)}KB</div>
  </div>`).join('');
  document.getElementById('tab-scores').innerHTML = `
    <div class="lifecycle-note"><span class="stage-chip">成长 / 智库</span>居民积分榜、skill/反馈沉淀、资产、方法与模板。</div>
    <h3>居民积分榜</h3>${scoreboard}
    <h3 style="margin-top:14px;">最新智库资产</h3><div class="asset-grid">${assetHtml || '<p style="opacity:0.4;text-align:center;padding:20px;grid-column:1/-1;">暂无资产</p>'}</div>`;

  // 奏折：正式治理建议 + 健康报告。
  const suggestions = d.suggestions.slice();
  const healthReport = `<div class="quest-item"><div class="q-status ${d.health < 70 ? 'processing':'done'}"></div><div class="q-info">
    <div class="q-title">小镇健康报告：${d.health} 分</div>
    <div class="q-agent">待处理 ${d.activeTasks.length} · 未评分 ${d.unratedQuests.length} · 待批奏折 ${d.pendingSuggestions.length}</div>
  </div></div>`;
  document.getElementById('tab-zouzhe').innerHTML = healthReport + (suggestions.reverse().map(s => {
    const st = s.status === 'pending' ? '⏳ 待批' : s.status === 'approved' ? '✅ 已批准' : '❌ 驳回';
    const review = s.review ? `<div style="font-size:11px;opacity:0.5;margin-top:4px;">批示：「${s.review}」</div>` : '';
    const btns = s.status === 'pending'
      ? `<div class="rate-btns" style="margin-top:6px">
           <button class="rate-btn sel-excellent" onclick="event.stopPropagation();approveSugg('${s.id}','approved')">批准</button>
           <button class="rate-btn sel-poor" onclick="event.stopPropagation();approveSugg('${s.id}','rejected')">驳回</button>
         </div>`
      : '';
    return `<div class="quest-item">
      <div class="q-status ${s.status==='pending'?'processing':'done'}"></div>
      <div class="q-info"><div class="q-title">${s.period || '奏折'} · ${s.title}</div>
        <div style="font-size:12px;opacity:0.5;">${s.description || s.desc || '(无描述)'} &nbsp; ${st} &nbsp; ${s.created_at || ''}</div>${review}${btns}</div>
    </div>`;
  }).join('') || '<p style="opacity:0.4;text-align:center;padding:20px;">暂无奏折。守护灵将在早8/午12/晚6呈报。</p>');

  // 探索：居民或系统自发发现的机会池。auto_generated 在此作为现有字段映射，不与悬赏板/任务记录重复。
  document.getElementById('tab-explore').innerHTML = `
    <div class="lifecycle-note"><span class="stage-chip">探索</span>居民或系统自发发现的机会池；采纳后才进入悬赏板，未采纳不进任务记录。</div>
    ${d.exploreIdeas.slice().reverse().map(t => {
      const ag = agents.find(a=>a.id===t.assignee);
      return `<div class="quest-item">
        <div class="q-status ${t.status}"></div>
        <div class="q-info">
          <div class="q-title">✨ ${t.title}</div>
          <div class="q-agent">${ag ? ag.emoji+' '+ag.name : '系统'} · 自主发现 · ${t.status}</div>
          ${t.body ? `<div class="q-meta">${t.body}</div>` : ''}
          <button class="reminder-action" onclick="publishTask('${String(t.title).replace(/'/g, "\\'")}')">采纳为悬赏</button>
        </div>
      </div>`;
    }).join('') || '<p style="opacity:0.4;text-align:center;padding:20px;">暂无未采纳探索。居民有新灵感时会先停留在这里。</p>'}`;
}

// ============================================================
// Interaction
// ============================================================
function openTownHall() {
  document.getElementById('townhall-modal').classList.add('show');
  switchTab('todo');
}
function openTownHallTab(tab) {
  document.getElementById('townhall-modal').classList.add('show');
  switchTab(tab);
}
function openGallery() {
  window.open('/gallery.html', '_blank');
}
function closeModal() {
  document.getElementById('townhall-modal').classList.remove('show');
}
function switchTab(tab) {
  activeTab = tab;
  const tabNames = {todo:'待办',quests:'悬赏板',history:'交付 / 任务记录',zouzhe:'奏折',explore:'探索',scores:'成长 / 智库'};
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.includes(tabNames[tab])));
  document.getElementById('tab-todo').style.display = tab === 'todo' ? '' : 'none';
  document.getElementById('tab-quests').style.display = tab === 'quests' ? '' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? '' : 'none';
  document.getElementById('tab-zouzhe').style.display = tab === 'zouzhe' ? '' : 'none';
  document.getElementById('tab-explore').style.display = tab === 'explore' ? '' : 'none';
  document.getElementById('tab-scores').style.display = tab === 'scores' ? '' : 'none';
}
async function publish() {
  const inp = document.getElementById('pub-input');
  const title = inp.value.trim();
  if (!title) return;
  await publishTask(title);
  inp.value = '';
}
async function approveSugg(id, action) {
  await fetch(API + '/api/approve', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id, action, review: action==='approved'?'批准':'驳回'})
  });
  await fetchState();
}
async function rateQuest(questId, rating) {
  const labels = {excellent:'卓越', good:'好评', ok:'一般', poor:'差评'};
  const review = prompt('给' + labels[rating] + '写一句评价吧~', '');
  if (review === null) return; // 用户取消
  await fetch(API + '/api/rate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({quest_id: questId, rating, review})
  });
  await fetchState();
}
function clickAgent(id) {
  const a = agents.find(x=>x.id===id);
  if (a) {
    const tasks = townState.tasks||[];
    const t = tasks.find(x=>x.assignee===id && x.status==='processing');
    alert(`${a.emoji} ${a.name}\n积分：${(townState.agents[id]||{xp:0}).xp}\n${t ? '正在：'+t.title : '待命中'}`);
  }
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = 780/rect.width, sy = 520/rect.height;
  const mx = (e.clientX-rect.left)*sx, my = (e.clientY-rect.top)*sy;
  // Check buildings
  for (const b of buildings) {
    if (mx >= b.x-2 && mx <= b.x+b.w+2 && my >= b.y-4 && my <= b.y+b.h+6) {
      if (b.id === 'townhall') openTownHall();
      else if (b.id === 'library') openLibrary();
      else if (b.id === 'studio') clickAgent('designer');
      else if (b.id === 'writer_h') clickAgent('writer');
      else if (b.id === 'review') clickAgent('reviewer');
      else if (b.id === 'media') clickAgent('engineer');
      return;
    }
  }
  // Check agents
  for (const a of agents) {
    if (Math.abs(mx-a.x) < 12 && Math.abs(my-a.y) < 16) {
      clickAgent(a.id);
      return;
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = 780/rect.width, sy = 520/rect.height;
  const mx = (e.clientX-rect.left)*sx, my = (e.clientY-rect.top)*sy;
  let cursor = 'default';
  for (const b of buildings) {
    if (mx >= b.x-2 && mx <= b.x+b.w+2 && my >= b.y-4 && my <= b.y+b.h+6) {
      cursor = 'pointer'; break;
    }
  }
  for (const a of agents) {
    if (Math.abs(mx-a.x) < 12 && Math.abs(my-a.y) < 16) { cursor = 'pointer'; break; }
  }
  canvas.style.cursor = cursor;
});

// ============================================================
// Game loop
// ============================================================
function update() {
  // Agent idle movement
  for (const a of agents) {
    if (!a.task && Math.random() < 0.004) {
      a.x += (Math.random()-0.5)*5; a.y += (Math.random()-0.5)*5;
      a.x = Math.max(15, Math.min(765, a.x)); a.y = Math.max(15, Math.min(505, a.y));
    }
    if (!a.task && Math.random() < 0.0008) a.target = {...a.home};
    if (a.target) {
      const dx = a.target.x-a.x, dy = a.target.y-a.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 1.5) a.target = null;
      else { a.x += dx*0.025; a.y += dy*0.025; }
    }
  }
  // Sync task state
  const tasks = townState.tasks || [];
  for (const a of agents) {
    const t = tasks.find(x=>x.assignee===a.id && x.status==='processing');
    a.task = t ? t.title : null;
  }
}

function gameLoop() {
  update();
  renderMap();
  requestAnimationFrame(gameLoop);
}

// Boot
if (window.__INIT_STATE__) renderAll();
fetchState();
gameLoop();
setInterval(fetchState, 8000); // Poll every 8s
</script>
